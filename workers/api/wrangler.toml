name = "brainverse-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "brainverse-db"
database_id = "placeholder-replace-with-real-id"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-replace-with-real-id"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-replace-with-real-id"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "brainverse-storage"

[vars]
environment = "production"
app_url = "https://cowb.cc"
preview_url = "https://preview.cowb.cc"
