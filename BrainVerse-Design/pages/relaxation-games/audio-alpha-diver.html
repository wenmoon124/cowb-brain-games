<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Audio Alpha Diver - BrainVerse 2.0</title>
  <meta name="description" content="Audio meditation exercise for alpha brainwave relaxation. BrainVerse by CowB.cc">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       AUDIO ALPHA DIVER - EXTREME MINIMALISM
       ============================================ */
    :root {
      --alpha-bg: #000000;
      --alpha-bg-glass: rgba(0, 0, 0, 0.85);
      --alpha-dot: rgba(74, 124, 255, 0.4);
      --alpha-dot-active: rgba(74, 124, 255, 0.8);
      --alpha-ripple: rgba(74, 124, 255, 0.25);
      --alpha-waveform: rgba(74, 124, 255, 0.4);
      --alpha-text-dim: rgba(248, 250, 252, 0.2);
      --alpha-text-subtle: rgba(248, 250, 252, 0.5);
      --alpha-border: rgba(255, 255, 255, 0.04);
      --alpha-safe-top: env(safe-area-inset-top, 0px);
      --alpha-safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ============================================
       BASE RESET
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-family);
      background: var(--alpha-bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ============================================
       APP SHELL
       ============================================ */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    /* ============================================
       1. TOP BAR - Ultra minimal
       ============================================ */
    .top-bar {
      position: relative;
      z-index: var(--z-sticky);
      height: 48px;
      padding-top: var(--alpha-safe-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--alpha-bg-glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--alpha-border);
      flex-shrink: 0;
    }

    .top-bar-left,
    .top-bar-center,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-sm);
      color: var(--alpha-text-dim);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast);
      flex-shrink: 0;
      text-decoration: none;
    }

    .btn-back:hover { background: rgba(255, 255, 255, 0.08); color: var(--alpha-text-subtle); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 16px; height: 16px; }

    .game-name {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--alpha-text-dim);
    }

    .top-timer {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      font-variant-numeric: tabular-nums;
      color: var(--alpha-text-dim);
    }

    /* ============================================
       2. GAME AREA - Full black, extreme minimal
       ============================================ */
    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: var(--z-base);
      overflow: hidden;
      cursor: pointer;
    }

    /* Breathing dot */
    .breathing-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--alpha-dot);
      animation: breatheDot 4s ease-in-out infinite;
      position: relative;
      z-index: 2;
      transition: background 300ms ease, transform 300ms ease;
    }

    @keyframes breatheDot {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.5); opacity: 0.6; }
    }

    /* Listen text */
    .listen-text {
      position: relative;
      z-index: 2;
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-normal);
      color: var(--alpha-text-dim);
      margin-top: var(--spacing-lg);
      animation: fadeInOut 6s ease-in-out infinite;
      letter-spacing: 0.06em;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      20%, 80% { opacity: 1; }
    }

    /* Waveform visualization */
    .waveform-container {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 400px;
      height: 40px;
      z-index: 2;
      overflow: hidden;
    }

    .waveform-canvas {
      width: 100%;
      height: 100%;
      opacity: 0.15;
    }

    /* Tap ripple effect */
    .tap-ripple {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--alpha-ripple);
      pointer-events: none;
      animation: tapRippleAnim 1.5s ease-out forwards;
      z-index: 3;
    }

    @keyframes tapRippleAnim {
      0% { width: 0; height: 0; opacity: 0.6; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }

    /* Session info - very dim */
    .session-info {
      position: absolute;
      bottom: var(--spacing-lg);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
    }

    .session-detail {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-normal);
      color: var(--alpha-text-dim);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    .freq-indicator {
      font-size: 10px;
      color: rgba(74, 124, 255, 0.25);
      margin-top: var(--spacing-xs);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ============================================
       3. BOTTOM BAR - Ultra minimal
       ============================================ */
    .bottom-bar {
      position: relative;
      z-index: var(--z-sticky);
      height: 56px;
      padding-bottom: var(--alpha-safe-bottom);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--alpha-bg-glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid var(--alpha-border);
      flex-shrink: 0;
    }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      min-height: 40px;
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      color: var(--alpha-text-dim);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    .btn-control:hover { background: rgba(255, 255, 255, 0.06); color: var(--alpha-text-subtle); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 16px; height: 16px; }

    .btn-end-session {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 40px;
      padding: 0 var(--spacing-md);
      border: 1px solid rgba(74, 124, 255, 0.12);
      border-radius: var(--radius-md);
      background: rgba(74, 124, 255, 0.05);
      color: rgba(74, 124, 255, 0.5);
      font-family: var(--font-family);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .btn-end-session:hover { background: rgba(74, 124, 255, 0.1); }
    .btn-end-session svg { width: 14px; height: 14px; }

    /* ============================================
       INSTRUCTIONS OVERLAY
       ============================================ */
    .instructions-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: var(--spacing-lg);
    }

    .instructions-overlay.hidden { display: none; }

    .instructions-card {
      width: 100%;
      max-width: 340px;
      text-align: center;
      animation: overlayEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes overlayEnter {
      0% { opacity: 0; transform: scale(0.95) translateY(12px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .instructions-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto var(--spacing-lg);
      border-radius: 50%;
      background: rgba(74, 124, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .instructions-icon svg {
      width: 24px;
      height: 24px;
      color: rgba(74, 124, 255, 0.6);
    }

    .instructions-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-semibold);
      margin-bottom: var(--spacing-sm);
      color: var(--text-primary);
    }

    .instructions-text {
      font-size: var(--font-size-sm);
      line-height: var(--line-height-relaxed);
      color: var(--text-secondary);
      margin-bottom: var(--spacing-xl);
    }

    .btn-begin {
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(74, 124, 255, 0.3), rgba(139, 92, 246, 0.2));
      color: var(--text-primary);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      letter-spacing: 0.02em;
    }

    .btn-begin:hover { background: linear-gradient(135deg, rgba(74, 124, 255, 0.4), rgba(139, 92, 246, 0.3)); }
    .btn-begin:active { transform: scale(0.97); }

    /* ============================================
       PAUSE OVERLAY
       ============================================ */
    .pause-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: var(--spacing-lg);
    }

    .pause-overlay.hidden { display: none; }

    .pause-card {
      width: 100%;
      max-width: 300px;
      background: rgba(15, 15, 20, 0.95);
      border: 1px solid var(--alpha-border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-2xl) var(--spacing-lg);
      text-align: center;
      animation: overlayEnter 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pause-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-semibold);
      margin-bottom: var(--spacing-lg);
      color: var(--text-primary);
    }

    .pause-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .btn-pause {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause:active { transform: scale(0.97); }

    .btn-pause-resume {
      background: linear-gradient(135deg, rgba(74, 124, 255, 0.3), rgba(139, 92, 246, 0.2));
      color: white;
    }

    .btn-pause-end {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-secondary);
    }

    .btn-pause-end:hover { background: rgba(255, 255, 255, 0.06); }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 640px) {
      .top-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); height: 44px; }
      .game-name { font-size: 11px; }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .waveform-container { width: 90%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <!-- ============================================
         1. TOP BAR - Ultra minimal
         ============================================ -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-name">Audio Alpha Diver</span>
      </div>

      <div class="top-bar-center">
        <!-- Ultra minimal - empty center -->
      </div>

      <div class="top-bar-right">
        <span class="top-timer" id="topTimer">0:00</span>
      </div>
    </header>

    <!-- ============================================
         2. GAME AREA - Full black
         ============================================ -->
    <main class="game-area" id="gameArea">
      <!-- Breathing dot -->
      <div class="breathing-dot" id="breathingDot"></div>

      <!-- Listen text -->
      <div class="listen-text" id="listenText">Listen...</div>

      <!-- Waveform visualization -->
      <div class="waveform-container">
        <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
      </div>

      <!-- Session info -->
      <div class="session-info">
        <div class="session-detail" id="sessionInfo">Session: 0:00 &middot; Responses: 0</div>
        <div class="freq-indicator">8-12 Hz Alpha Range</div>
      </div>
    </main>

    <!-- ============================================
         3. BOTTOM BAR
         ============================================ -->
    <footer class="bottom-bar">
      <button class="btn-control" id="btnPause" aria-label="Pause">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      </button>

      <button class="btn-end-session" id="btnEndSession">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
        </svg>
        End
      </button>

      <button class="btn-control" id="btnSound" aria-label="Toggle sound">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>

      <button class="btn-control" id="btnInfo" aria-label="Info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
      </button>
    </footer>

  </div>

  <!-- ============================================
       INSTRUCTIONS OVERLAY (shown at start)
       ============================================ -->
  <div class="instructions-overlay" id="instructionsOverlay">
    <div class="instructions-card">
      <div class="instructions-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <div class="instructions-title">Audio Alpha Diver</div>
      <div class="instructions-text">
        Close your eyes. Listen for the wave sound. Tap when you hear it.
      </div>
      <button class="btn-begin" id="btnBegin">Begin Session</button>
    </div>
  </div>

  <!-- ============================================
       PAUSE OVERLAY
       ============================================ -->
  <div class="pause-overlay hidden" id="pauseOverlay">
    <div class="pause-card">
      <div class="pause-title">Paused</div>
      <div class="pause-buttons">
        <button class="btn-pause btn-pause-resume" id="btnResume">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Resume
        </button>
        <button class="btn-pause btn-pause-end" id="btnQuit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          End Session
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================
       JAVASCRIPT
       ============================================ -->
  <script>
    (function() {
      // ---- Elements ----
      const gameArea = document.getElementById('gameArea');
      const waveformCanvas = document.getElementById('waveformCanvas');
      const sessionInfoEl = document.getElementById('sessionInfo');
      const topTimerEl = document.getElementById('topTimer');
      const instructionsOverlay = document.getElementById('instructionsOverlay');
      const pauseOverlay = document.getElementById('pauseOverlay');
      const breathingDot = document.getElementById('breathingDot');
      const listenText = document.getElementById('listenText');

      // ---- State ----
      let sessionSeconds = 0;
      let responses = 0;
      let isPaused = false;
      let isStarted = false;
      let sessionInterval = null;
      let waveformCtx = null;
      let waveformAnimId = null;

      // ---- Format time ----
      function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return m + ':' + (sec < 10 ? '0' : '') + sec;
      }

      // ---- Update displays ----
      function updateDisplays() {
        const t = formatTime(sessionSeconds);
        topTimerEl.textContent = t;
        sessionInfoEl.textContent = 'Session: ' + t + ' \u00B7 Responses: ' + responses;
      }

      // ---- Waveform visualization ----
      function initWaveform() {
        const rect = waveformCanvas.getBoundingClientRect();
        waveformCanvas.width = rect.width * 2;
        waveformCanvas.height = rect.height * 2;
        waveformCtx = waveformCanvas.getContext('2d');
        waveformCtx.scale(2, 2);
        drawWaveform();
      }

      function drawWaveform() {
        if (!waveformCtx) return;
        const w = waveformCanvas.width / 2;
        const h = waveformCanvas.height / 2;
        const time = Date.now() / 1000;

        waveformCtx.clearRect(0, 0, w, h);
        waveformCtx.beginPath();
        waveformCtx.strokeStyle = 'rgba(74, 124, 255, 0.4)';
        waveformCtx.lineWidth = 1;

        for (let x = 0; x < w; x++) {
          const y = h / 2 +
            Math.sin(x * 0.03 + time * 2) * 3 +
            Math.sin(x * 0.01 + time * 0.5) * 5 +
            Math.sin(x * 0.08 + time * 3) * 1.5;

          if (x === 0) waveformCtx.moveTo(x, y);
          else waveformCtx.lineTo(x, y);
        }

        waveformCtx.stroke();
        waveformAnimId = requestAnimationFrame(drawWaveform);
      }

      // ---- Tap ripple effect ----
      function createRipple(x, y) {
        const ripple = document.createElement('div');
        ripple.className = 'tap-ripple';
        ripple.style.left = (x - 100) + 'px';
        ripple.style.top = (y - 100) + 'px';
        gameArea.appendChild(ripple);

        // Brief dot flash
        breathingDot.style.background = 'rgba(74, 124, 255, 0.8)';
        breathingDot.style.transform = 'scale(2)';
        setTimeout(() => {
          breathingDot.style.background = '';
          breathingDot.style.transform = '';
        }, 300);

        setTimeout(() => ripple.remove(), 1500);
      }

      // ---- Game area tap ----
      gameArea.addEventListener('click', function(e) {
        if (!isStarted || isPaused) return;
        const rect = gameArea.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        createRipple(x, y);
        responses++;
        updateDisplays();
      });

      // ---- Session timer ----
      function startSessionTimer() {
        sessionInterval = setInterval(() => {
          if (!isPaused) {
            sessionSeconds++;
            updateDisplays();
          }
        }, 1000);
      }

      // ---- Begin session ----
      document.getElementById('btnBegin').addEventListener('click', () => {
        instructionsOverlay.classList.add('hidden');
        isStarted = true;
        startSessionTimer();
        initWaveform();
      });

      // ---- Pause / Resume ----
      function togglePause() {
        isPaused = !isPaused;
        pauseOverlay.classList.toggle('hidden', !isPaused);
        if (isPaused) {
          cancelAnimationFrame(waveformAnimId);
        } else {
          drawWaveform();
        }
      }

      document.getElementById('btnPause').addEventListener('click', () => {
        if (isStarted) togglePause();
      });
      document.getElementById('btnResume').addEventListener('click', togglePause);
      document.getElementById('btnQuit').addEventListener('click', () => {
        isPaused = true;
        clearInterval(sessionInterval);
        cancelAnimationFrame(waveformAnimId);
        window.location.href = '../game-hub/index.html';
      });

      // ---- Sound toggle ----
      let soundOn = true;
      const btnSound = document.getElementById('btnSound');
      btnSound.addEventListener('click', () => {
        soundOn = !soundOn;
        btnSound.innerHTML = soundOn
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
      });

      // ---- Info ----
      document.getElementById('btnInfo').addEventListener('click', () => {
        if (isStarted) {
          isPaused = true;
          cancelAnimationFrame(waveformAnimId);
          pauseOverlay.classList.remove('hidden');
        }
      });

      // ---- End session ----
      document.getElementById('btnEndSession').addEventListener('click', () => {
        if (isStarted) {
          isPaused = true;
          clearInterval(sessionInterval);
          cancelAnimationFrame(waveformAnimId);
          pauseOverlay.classList.remove('hidden');
        }
      });
    })();
  </script>
</body>
</html>
