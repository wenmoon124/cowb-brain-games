<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BrainVerse 2.0 - Eagle Eye | CowB.cc</title>
  <meta name="description" content="Test peripheral vision and spatial recall. Flash, remember, locate.">
  <meta name="theme-color" content="#06B6D4">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       Eagle Eye - Game-Specific Styles
       All colors use CSS custom properties from global.css
       ============================================ */

    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    /* ===== FIXED TOP BAR (56px) ===== */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 56px;
      padding-top: env(safe-area-inset-top, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .top-bar::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dim-attention), transparent);
      opacity: 0.4;
    }

    .top-bar-left,
    .top-bar-center,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      flex-shrink: 0;
      text-decoration: none;
    }
    .btn-back:hover { background: var(--card-hover); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 20px; height: 20px; }

    .game-name {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--dim-attention);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: #FFFFFF;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .score-display svg { width: 14px; height: 14px; color: var(--accent); }

    .lives-display { display: flex; align-items: center; gap: 2px; }
    .heart { font-size: 14px; line-height: 1; transition: all var(--transition-normal); }
    .heart.lost { opacity: 0.2; filter: grayscale(1); }

    .accuracy-meter { display: flex; align-items: center; gap: 6px; }
    .accuracy-label { font-size: 10px; font-weight: var(--font-weight-medium); color: var(--text-muted); text-transform: uppercase; }
    .accuracy-bar { width: 48px; height: 4px; background: var(--bg-secondary); border-radius: var(--radius-full); overflow: hidden; }
    .accuracy-bar-fill { height: 100%; background: linear-gradient(90deg, var(--dim-attention), var(--dim-attention-light)); border-radius: var(--radius-full); transition: width var(--transition-normal); }

    /* ===== MAIN GAME AREA ===== */
    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: var(--z-base);
      overflow: hidden;
      padding: var(--spacing-lg);
      padding-top: calc(56px + var(--spacing-lg) + env(safe-area-inset-top, 0px));
      padding-bottom: calc(72px + var(--spacing-lg) + env(safe-area-inset-bottom, 0px));
    }

    /* ===== DARK CANVAS ===== */
    .eagle-canvas {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 4 / 3;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      position: relative;
      overflow: hidden;
      cursor: crosshair;
      box-shadow: var(--shadow-lg);
    }

    /* Dark overlay on canvas */
    .eagle-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      border-radius: inherit;
      z-index: 0;
    }

    /* Concentric distance guides */
    .distance-guides {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .guide-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--dim-attention-light);
      opacity: 0.15;
    }
    .guide-ring:nth-child(1) { width: 100px; height: 100px; }
    .guide-ring:nth-child(2) { width: 200px; height: 200px; }
    .guide-ring:nth-child(3) { width: 300px; height: 300px; }
    .guide-ring:nth-child(4) { width: 400px; height: 400px; }

    /* Center letter display */
    .center-letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 96px;
      font-weight: var(--font-weight-extrabold);
      color: var(--text-primary);
      z-index: 3;
      text-shadow: 0 0 40px var(--dim-attention-light);
      animation: letter-flash 0.2s ease-out;
    }
    @keyframes letter-flash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Target dot (periphery) */
    .target-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--dim-attention);
      box-shadow: 0 0 16px var(--dim-attention-light), 0 0 32px var(--dim-attention-light);
      z-index: 3;
      animation: target-flash 0.2s ease-out;
    }
    @keyframes target-flash {
      0% { opacity: 0; transform: scale(2); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Crosshair marker */
    .crosshair-marker {
      position: absolute;
      width: 24px;
      height: 24px;
      z-index: 4;
      transform: translate(-50%, -50%);
    }
    .crosshair-marker::before,
    .crosshair-marker::after {
      content: '';
      position: absolute;
      background: var(--dim-attention);
    }
    .crosshair-marker::before {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      transform: translateY(-50%);
    }
    .crosshair-marker::after {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-50%);
    }

    /* User tap dot */
    .user-tap {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 2px solid var(--dim-attention);
      transform: translate(-50%, -50%);
      z-index: 5;
      animation: tap-appear 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes tap-appear {
      0% { transform: translate(-50%, -50%) scale(0); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* Green ring animation at tap position */
    .correct-ring {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--success);
      transform: translate(-50%, -50%);
      z-index: 5;
      animation: ring-expand 0.6s ease-out forwards;
    }
    @keyframes ring-expand {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    /* Distance feedback label */
    .distance-label {
      position: absolute;
      z-index: 6;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      transform: translate(-50%, -100%);
      animation: label-fade 2s ease-out forwards;
    }
    .distance-label.great {
      background: rgba(80, 200, 168, 0.15);
      color: var(--success);
      border: 1px solid rgba(80, 200, 168, 0.3);
    }
    .distance-label.ok {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid rgba(255, 177, 74, 0.3);
    }
    .distance-label.miss {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    @keyframes label-fade {
      0% { opacity: 0; transform: translate(-50%, -80%); }
      15% { opacity: 1; transform: translate(-50%, -100%); }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Phase indicator */
    .phase-indicator {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: 6px 16px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
    }
    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dim-attention);
    }
    .phase-dot.active { animation: phase-pulse 1s ease-in-out infinite; }
    .phase-dot.done { background: var(--success); }
    @keyframes phase-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Level info */
    .level-info {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 4px 12px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-sm);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
    }

    /* Letter input area */
    .letter-input-area {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .letter-input {
      width: 72px;
      height: 80px;
      text-align: center;
      font-family: var(--font-family);
      font-size: 48px;
      font-weight: var(--font-weight-extrabold);
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      outline: none;
      text-transform: uppercase;
      caret-color: var(--dim-attention);
    }
    .letter-input:focus {
      border-color: var(--dim-attention);
      box-shadow: 0 0 0 3px var(--dim-attention-light);
    }
    .letter-input-label {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
    }

    /* ===== FIXED BOTTOM BAR (72px) ===== */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 72px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .bottom-bar::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dim-attention), transparent);
      opacity: 0.4;
    }

    .bottom-bar-left,
    .bottom-bar-center,
    .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .bottom-bar-left { flex: 1; justify-content: flex-start; }
    .bottom-bar-center { flex: 0 0 auto; }
    .bottom-bar-right { flex: 1; justify-content: flex-end; }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    }
    .btn-control:hover { background: var(--card-hover); color: var(--text-primary); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 20px; height: 20px; }

    .btn-primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 44px;
      padding: 0 var(--spacing-xl);
      border: none;
      border-radius: var(--radius-lg);
      background: var(--dim-attention);
      color: #FFFFFF;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: var(--shadow-glow-attention);
      white-space: nowrap;
    }
    .btn-primary-action:hover { transform: translateY(-1px); box-shadow: 0 0 28px var(--dim-attention-light); }
    .btn-primary-action:active { transform: translateY(0) scale(0.97); }
    .btn-primary-action svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 0 var(--spacing-md);
      border: none;
      background: var(--accent-light);
      border-radius: var(--radius-md);
      color: var(--accent);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .btn-hint:hover { filter: brightness(1.1); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .top-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .game-name { font-size: var(--font-size-xs); }
      .level-pill { font-size: 10px; padding: 2px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-meter { display: none; }
      .game-area { padding: var(--spacing-md); padding-top: calc(56px + var(--spacing-md) + env(safe-area-inset-top, 0px)); padding-bottom: calc(72px + var(--spacing-md) + env(safe-area-inset-bottom, 0px)); }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .btn-primary-action { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-sm); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .center-letter { font-size: 72px; }
      .letter-input { width: 60px; height: 68px; font-size: 40px; }
      .guide-ring:nth-child(1) { width: 80px; height: 80px; }
      .guide-ring:nth-child(2) { width: 160px; height: 160px; }
      .guide-ring:nth-child(3) { width: 240px; height: 240px; }
      .guide-ring:nth-child(4) { width: 320px; height: 320px; }
    }

    @media (max-width: 380px) {
      .center-letter { font-size: 56px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ===== TOP BAR ===== -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-name">Eagle Eye</span>
      </div>
      <div class="top-bar-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          Level 2
        </div>
      </div>
      <div class="top-bar-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          960
        </div>
        <div class="lives-display">
          <span class="heart">&#10084;&#65039;</span>
          <span class="heart">&#10084;&#65039;</span>
          <span class="heart lost">&#10084;&#65039;</span>
        </div>
        <div class="accuracy-meter">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar">
            <div class="accuracy-bar-fill" style="width: 68%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== GAME AREA ===== -->
    <main class="game-area">
      <div class="eagle-canvas" id="eagleCanvas">

        <!-- Phase indicator -->
        <div class="phase-indicator">
          <div class="phase-dot done"></div>
          <div class="phase-dot done"></div>
          <div class="phase-dot active"></div>
          <span>Phase 3: Tap the target</span>
        </div>

        <!-- Concentric distance guides -->
        <div class="distance-guides">
          <div class="guide-ring"></div>
          <div class="guide-ring"></div>
          <div class="guide-ring"></div>
          <div class="guide-ring"></div>
        </div>

        <!-- Center letter (Phase 1 flash) -->
        <div class="center-letter" id="centerLetter">K</div>

        <!-- Target dot at periphery -->
        <div class="target-dot" id="targetDot" style="top: 18%; left: 78%;"></div>

        <!-- Crosshair marker at actual target position -->
        <div class="crosshair-marker" id="crosshairMarker" style="top: 18%; left: 78%;"></div>

        <!-- User's tap position -->
        <div class="user-tap" id="userTap" style="top: 22%; left: 76%;"></div>

        <!-- Correct ring animation -->
        <div class="correct-ring" id="correctRing" style="top: 22%; left: 76%;"></div>

        <!-- Distance feedback label -->
        <div class="distance-label great" id="distanceLabel" style="top: 14%; left: 76%;">
          12px off - Great!
        </div>

        <!-- Letter input area (Phase 2) -->
        <div class="letter-input-area" id="letterInputArea">
          <span class="letter-input-label">What letter did you see?</span>
          <input type="text" class="letter-input" maxlength="1" value="K" readonly>
        </div>

        <!-- Level info -->
        <div class="level-info">Eccentricity: Medium</div>

      </div>
    </main>

    <!-- ===== BOTTOM BAR ===== -->
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button class="btn-control" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
      </div>
      <div class="bottom-bar-center">
        <button class="btn-primary-action">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Submit
        </button>
      </div>
      <div class="bottom-bar-right">
        <button class="btn-hint" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Hint</span>
        </button>
        <button class="btn-control" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script>
    // Sound toggle
    const soundBtn = document.querySelector('.btn-control[aria-label="Toggle sound"]');
    let soundOn = true;
    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundBtn.innerHTML = soundOn
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
    });

    // Canvas click handler for Phase 3
    const canvas = document.getElementById('eagleCanvas');
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;

      const tap = document.createElement('div');
      tap.className = 'user-tap';
      tap.style.left = x + '%';
      tap.style.top = y + '%';
      canvas.appendChild(tap);

      const ring = document.createElement('div');
      ring.className = 'correct-ring';
      ring.style.left = x + '%';
      ring.style.top = y + '%';
      canvas.appendChild(ring);

      const label = document.createElement('div');
      label.className = 'distance-label great';
      label.style.left = x + '%';
      label.style.top = (y - 3) + '%';
      label.textContent = '12px off - Great!';
      canvas.appendChild(label);

      setTimeout(() => { tap.remove(); ring.remove(); label.remove(); }, 2000);
    });
  </script>
</body>
</html>
