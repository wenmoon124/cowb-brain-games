<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BrainVerse 2.0 - Split Focus | CowB.cc</title>
  <meta name="description" content="Dual-task challenge. Process two streams simultaneously.">
  <meta name="theme-color" content="#06B6D4">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       Split Focus - Game-Specific Styles
       All colors use CSS custom properties from global.css
       ============================================ */

    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    /* ===== FIXED TOP BAR (56px) ===== */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 56px;
      padding-top: env(safe-area-inset-top, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .top-bar::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dim-attention), transparent);
      opacity: 0.4;
    }

    .top-bar-left,
    .top-bar-center,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      flex-shrink: 0;
      text-decoration: none;
    }
    .btn-back:hover { background: var(--card-hover); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 20px; height: 20px; }

    .game-name {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--dim-attention);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: #FFFFFF;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .score-display svg { width: 14px; height: 14px; color: var(--accent); }

    .lives-display { display: flex; align-items: center; gap: 2px; }
    .heart { font-size: 14px; line-height: 1; transition: all var(--transition-normal); }
    .heart.lost { opacity: 0.2; filter: grayscale(1); }

    .accuracy-meter { display: flex; align-items: center; gap: 6px; }
    .accuracy-label { font-size: 10px; font-weight: var(--font-weight-medium); color: var(--text-muted); text-transform: uppercase; }
    .accuracy-bar { width: 48px; height: 4px; background: var(--bg-secondary); border-radius: var(--radius-full); overflow: hidden; }
    .accuracy-bar-fill { height: 100%; background: linear-gradient(90deg, var(--dim-attention), var(--dim-attention-light)); border-radius: var(--radius-full); transition: width var(--transition-normal); }

    /* ===== MAIN GAME AREA ===== */
    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: var(--z-base);
      overflow: hidden;
      padding: var(--spacing-lg);
      padding-top: calc(56px + var(--spacing-lg) + env(safe-area-inset-top, 0px));
      padding-bottom: calc(72px + var(--spacing-lg) + env(safe-area-inset-bottom, 0px));
      background-image: radial-gradient(circle, var(--dim-attention-light) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* Score split display */
    .score-split {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      padding: 6px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .score-split .left-score { color: var(--dim-attention); }
    .score-split .right-score { color: var(--dim-attention); }
    .score-split .divider {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    /* ===== SPLIT PANELS ===== */
    .split-panels {
      width: 100%;
      max-width: 640px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: 100%;
      max-height: 440px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      box-shadow: var(--shadow-lg);
    }

    /* Glowing divider */
    .split-panels::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: var(--dim-attention);
      box-shadow: 0 0 12px var(--dim-attention-light), 0 0 24px var(--dim-attention-light);
      z-index: 10;
      transform: translateX(-50%);
    }

    /* Individual panel */
    .panel {
      display: flex;
      flex-direction: column;
      background: var(--card);
      position: relative;
      overflow: hidden;
    }

    /* Panel header */
    .panel-header {
      padding: 10px var(--spacing-md);
      text-align: center;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    /* Scrolling content area */
    .panel-scroll {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Scroll items */
    .scroll-item {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-muted);
      transition: background var(--transition-fast), color var(--transition-fast);
      position: relative;
    }

    /* Active item (highlighted) */
    .scroll-item.active {
      background: var(--dim-attention-light);
      color: var(--dim-attention);
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-extrabold);
    }
    .scroll-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--dim-attention);
      border-radius: 0 2px 2px 0;
    }

    /* Scrolling animation wrapper */
    .scroll-track {
      animation: scroll-down 8s linear infinite;
    }
    @keyframes scroll-down {
      0% { transform: translateY(0); }
      100% { transform: translateY(-240px); }
    }

    /* Panel flash feedback */
    .panel.flash-correct {
      animation: flash-green 0.3s ease;
    }
    @keyframes flash-green {
      0% { background: var(--card); }
      50% { background: rgba(80, 200, 168, 0.15); }
      100% { background: var(--card); }
    }

    .panel.flash-wrong {
      animation: flash-red-shake 0.4s ease;
    }
    @keyframes flash-red-shake {
      0% { background: var(--card); transform: translateX(0); }
      20% { background: rgba(239, 68, 68, 0.15); transform: translateX(-3px); }
      40% { background: rgba(239, 68, 68, 0.1); transform: translateX(3px); }
      60% { background: rgba(239, 68, 68, 0.05); transform: translateX(-2px); }
      80% { background: rgba(239, 68, 68, 0.02); transform: translateX(2px); }
      100% { background: var(--card); transform: translateX(0); }
    }

    /* Panel action buttons */
    .panel-actions {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      border-top: 1px solid var(--border-light);
    }

    .panel-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .panel-btn:first-child {
      border-right: 1px solid var(--border-light);
    }
    .panel-btn:hover {
      background: var(--card-hover);
      color: var(--text-primary);
    }
    .panel-btn:active {
      transform: scale(0.96);
      background: var(--dim-attention-light);
      color: var(--dim-attention);
    }

    /* ===== FIXED BOTTOM BAR (72px) ===== */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 72px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .bottom-bar::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dim-attention), transparent);
      opacity: 0.4;
    }

    .bottom-bar-left,
    .bottom-bar-center,
    .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .bottom-bar-left { flex: 1; justify-content: flex-start; }
    .bottom-bar-center { flex: 0 0 auto; }
    .bottom-bar-right { flex: 1; justify-content: flex-end; }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    }
    .btn-control:hover { background: var(--card-hover); color: var(--text-primary); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 20px; height: 20px; }

    .btn-primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 44px;
      padding: 0 var(--spacing-xl);
      border: none;
      border-radius: var(--radius-lg);
      background: var(--dim-attention);
      color: #FFFFFF;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: var(--shadow-glow-attention);
      white-space: nowrap;
    }
    .btn-primary-action:hover { transform: translateY(-1px); box-shadow: 0 0 28px var(--dim-attention-light); }
    .btn-primary-action:active { transform: translateY(0) scale(0.97); }
    .btn-primary-action svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 0 var(--spacing-md);
      border: none;
      background: var(--accent-light);
      border-radius: var(--radius-md);
      color: var(--accent);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .btn-hint:hover { filter: brightness(1.1); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .top-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .game-name { font-size: var(--font-size-xs); }
      .level-pill { font-size: 10px; padding: 2px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-meter { display: none; }
      .game-area { padding: var(--spacing-md); padding-top: calc(56px + var(--spacing-md) + env(safe-area-inset-top, 0px)); padding-bottom: calc(72px + var(--spacing-md) + env(safe-area-inset-bottom, 0px)); }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .btn-primary-action { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-sm); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .split-panels { max-height: 380px; }
      .scroll-item { height: 42px; font-size: var(--font-size-lg); }
      .scroll-item.active { font-size: var(--font-size-xl); }
      .panel-btn { min-height: 46px; font-size: var(--font-size-sm); }
      .panel-header { font-size: var(--font-size-xs); padding: var(--spacing-sm) var(--spacing-md); }
    }

    @media (max-width: 380px) {
      .split-panels { max-height: 320px; }
      .scroll-item { height: 38px; font-size: var(--font-size-md); }
      .scroll-item.active { font-size: var(--font-size-lg); }
      .score-split { font-size: var(--font-size-xs); padding: 4px var(--spacing-md); }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ===== TOP BAR ===== -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-name">Split Focus</span>
      </div>
      <div class="top-bar-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          Level 5
        </div>
      </div>
      <div class="top-bar-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          1,750
        </div>
        <div class="lives-display">
          <span class="heart">&#10084;&#65039;</span>
          <span class="heart">&#10084;&#65039;</span>
          <span class="heart lost">&#10084;&#65039;</span>
        </div>
        <div class="accuracy-meter">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar">
            <div class="accuracy-bar-fill" style="width: 78%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== GAME AREA ===== -->
    <main class="game-area">

      <!-- Score split display -->
      <div class="score-split">
        <span>Left: <span class="left-score">5</span></span>
        <div class="divider"></div>
        <span>Right: <span class="right-score">3</span></span>
      </div>

      <!-- Split panels -->
      <div class="split-panels">

        <!-- LEFT PANEL: Odd or Even -->
        <div class="panel" id="panelLeft">
          <div class="panel-header">Odd or Even?</div>
          <div class="panel-scroll">
            <div class="scroll-track">
              <div class="scroll-item">42</div>
              <div class="scroll-item">17</div>
              <div class="scroll-item">8</div>
              <div class="scroll-item">23</div>
              <div class="scroll-item active">37</div>
              <div class="scroll-item">91</div>
              <div class="scroll-item">56</div>
              <div class="scroll-item">14</div>
              <div class="scroll-item">63</div>
              <div class="scroll-item">29</div>
              <div class="scroll-item">78</div>
              <div class="scroll-item">5</div>
            </div>
          </div>
          <div class="panel-actions">
            <button class="panel-btn" data-panel="left" data-answer="odd">Odd</button>
            <button class="panel-btn" data-panel="left" data-answer="even">Even</button>
          </div>
        </div>

        <!-- RIGHT PANEL: Vowel or Consonant -->
        <div class="panel" id="panelRight">
          <div class="panel-header">Vowel or Consonant?</div>
          <div class="panel-scroll">
            <div class="scroll-track" style="animation-duration: 10s;">
              <div class="scroll-item">M</div>
              <div class="scroll-item">A</div>
              <div class="scroll-item">K</div>
              <div class="scroll-item">E</div>
              <div class="scroll-item">R</div>
              <div class="scroll-item active">P</div>
              <div class="scroll-item">I</div>
              <div class="scroll-item">T</div>
              <div class="scroll-item">O</div>
              <div class="scroll-item">N</div>
              <div class="scroll-item">U</div>
              <div class="scroll-item">B</div>
            </div>
          </div>
          <div class="panel-actions">
            <button class="panel-btn" data-panel="right" data-answer="vowel">Vowel</button>
            <button class="panel-btn" data-panel="right" data-answer="consonant">Consonant</button>
          </div>
        </div>

      </div>

    </main>

    <!-- ===== BOTTOM BAR ===== -->
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button class="btn-control" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
      </div>
      <div class="bottom-bar-center">
        <button class="btn-primary-action">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Next
        </button>
      </div>
      <div class="bottom-bar-right">
        <button class="btn-hint" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Hint</span>
        </button>
        <button class="btn-control" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script>
    // Sound toggle
    const soundBtn = document.querySelector('.btn-control[aria-label="Toggle sound"]');
    let soundOn = true;
    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundBtn.innerHTML = soundOn
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
    });

    // Panel button click handlers
    const panelBtns = document.querySelectorAll('.panel-btn');
    const panelLeft = document.getElementById('panelLeft');
    const panelRight = document.getElementById('panelRight');

    panelBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const panelId = btn.dataset.panel;
        const panel = panelId === 'left' ? panelLeft : panelRight;

        panel.classList.remove('flash-correct', 'flash-wrong');
        void panel.offsetWidth;
        panel.classList.add('flash-correct');

        setTimeout(() => {
          panel.classList.remove('flash-correct');
        }, 300);
      });
    });
  </script>
</body>
</html>
