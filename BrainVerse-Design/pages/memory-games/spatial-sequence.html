<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F9FC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Spatial Sequence - BrainVerse 2.0</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    /* ============================================
       APP SHELL
       ============================================ */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
    }

    /* ============================================
       FIXED TOP BAR (56px)
       ============================================ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-bar-left,
    .top-bar-center,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      flex-shrink: 0;
    }

    .btn-back:hover { background: var(--primary-bg); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 22px; height: 22px; }

    .game-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: var(--dim-memory);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: #FFFFFF;
      white-space: nowrap;
    }

    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
    }

    .score-display svg { width: 16px; height: 16px; color: var(--accent); }

    .lives-display {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .heart-icon {
      width: 18px;
      height: 18px;
      transition: all var(--transition-normal);
    }

    .heart-icon.active {
      color: var(--error);
      fill: var(--error);
      filter: drop-shadow(0 0 3px rgba(239, 68, 68, 0.4));
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    .heart-icon.empty {
      color: var(--text-muted);
      fill: none;
      opacity: 0.35;
    }

    .accuracy-meter {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .accuracy-label {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .accuracy-bar {
      width: 48px;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .accuracy-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dim-memory), #A78BFA);
      border-radius: var(--radius-full);
      transition: width var(--transition-normal);
    }

    /* ============================================
       GAME CONTENT AREA
       ============================================ */
    .game-content {
      flex: 1;
      margin-top: 56px;
      margin-bottom: 72px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg) var(--spacing-md);
    }

    .game-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    /* Level Info */
    .level-info {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--text-secondary);
    }

    /* Phase Indicator */
    .phase-indicator {
      text-align: center;
    }

    .phase-text {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--dim-memory);
      letter-spacing: 0.02em;
    }

    .phase-text.watch {
      animation: pulse 1.2s ease-in-out infinite;
    }

    .phase-text.recall {
      color: var(--primary);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .phase-subtext {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      margin-top: var(--spacing-xs);
    }

    /* Spatial Grid */
    .spatial-grid-wrapper {
      position: relative;
      width: 100%;
      max-width: 320px;
    }

    .spatial-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--spacing-md);
      touch-action: manipulation;
    }

    .node {
      aspect-ratio: 1;
      border-radius: var(--radius-full);
      background: var(--card);
      border: 3px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-normal);
      position: relative;
      min-width: 0;
      min-height: 44px;
    }

    .node:hover {
      border-color: var(--dim-memory);
      transform: scale(1.05);
    }

    .node:active {
      transform: scale(0.95);
    }

    .node-label {
      font-size: 9px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      position: absolute;
      bottom: -16px;
      white-space: nowrap;
    }

    /* Active node during watch phase */
    .node.active {
      background: linear-gradient(135deg, var(--primary), var(--dim-memory));
      border-color: var(--primary);
      box-shadow: 0 0 24px var(--shadow-glow-primary), 0 0 48px var(--primary-light);
      transform: scale(1.15);
    }

    .node.active .node-label {
      color: var(--primary);
    }

    /* Correct tap */
    .node.correct {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 20px rgba(80, 200, 168, 0.4);
      animation: correctBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes correctBounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .node.correct::after {
      content: '';
      width: 16px;
      height: 16px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='20 6 9 17 4 12'/%3E%3C/svg%3E");
      background-size: contain;
      background-repeat: no-repeat;
    }

    /* Wrong tap */
    .node.wrong {
      background: var(--error);
      border-color: var(--error);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
      animation: shake 0.5s ease-in-out;
    }

    /* Tapped node (trail) */
    .node.tapped {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    /* Disabled */
    .node.disabled {
      pointer-events: none;
      opacity: 0.5;
    }

    /* SVG Path Trail */
    .path-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .path-line {
      stroke: var(--primary);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      opacity: 0.5;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawPath 0.3s ease forwards;
    }

    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    /* Audio Bars (decorative) */
    .audio-bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 32px;
      margin-top: var(--spacing-md);
    }

    .audio-bar {
      width: 4px;
      border-radius: var(--radius-full);
      background: linear-gradient(180deg, var(--dim-memory), var(--primary));
      animation: audioBarBounce 0.8s ease-in-out infinite alternate;
    }

    .audio-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
    .audio-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
    .audio-bar:nth-child(3) { height: 28px; animation-delay: 0.2s; }
    .audio-bar:nth-child(4) { height: 16px; animation-delay: 0.3s; }
    .audio-bar:nth-child(5) { height: 24px; animation-delay: 0.15s; }
    .audio-bar:nth-child(6) { height: 10px; animation-delay: 0.25s; }
    .audio-bar:nth-child(7) { height: 18px; animation-delay: 0.05s; }

    @keyframes audioBarBounce {
      0% { transform: scaleY(0.3); }
      100% { transform: scaleY(1); }
    }

    .audio-bars.paused .audio-bar {
      animation-play-state: paused;
    }

    /* ============================================
       FIXED BOTTOM BAR (72px)
       ============================================ */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 72px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .bottom-bar-left,
    .bottom-bar-center,
    .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .bottom-bar-left { flex: 1; justify-content: flex-start; }
    .bottom-bar-center { flex: 0 0 auto; }
    .bottom-bar-right { flex: 1; justify-content: flex-end; }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    }

    .btn-control:hover { background: var(--border); color: var(--text-primary); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 20px; height: 20px; }

    .btn-primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 48px;
      padding: 0 var(--spacing-xl);
      border: none;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
      white-space: nowrap;
    }

    .btn-primary-action:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--shadow-glow-memory); }
    .btn-primary-action:active { transform: translateY(0) scale(0.97); }
    .btn-primary-action svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 0 var(--spacing-md);
      border: none;
      background: var(--accent-light);
      border-radius: var(--radius-md);
      color: var(--accent);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-hint:hover { background: rgba(255, 177, 74, 0.25); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ============================================
       PAUSE OVERLAY
       ============================================ */
    .pause-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: var(--spacing-lg);
      animation: fadeIn var(--transition-normal);
    }

    .pause-overlay.hidden { display: none; }

    .pause-card {
      width: 100%;
      max-width: 320px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      text-align: center;
      animation: scaleIn var(--transition-normal);
    }

    .pause-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-lg);
    }

    .pause-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .btn-pause {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause:active { transform: scale(0.97); }

    .btn-pause-resume {
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
    }

    .btn-pause-restart { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-pause-restart:hover { background: var(--border); }

    .btn-pause-quit { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .btn-pause-quit:hover { background: rgba(239, 68, 68, 0.18); }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 639px) {
      .top-bar { padding: 0 var(--spacing-sm); }
      .game-title { font-size: var(--font-size-sm); }
      .level-pill { font-size: 10px; padding: 3px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-meter { display: none; }
      .game-content { padding: var(--spacing-md) var(--spacing-sm); }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .btn-primary-action { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-sm); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .spatial-grid-wrapper { max-width: 260px; }
      .spatial-grid { gap: var(--spacing-sm); }
      .phase-text { font-size: var(--font-size-lg); }
      .node-label { font-size: 8px; }
    }

    @media (max-width: 379px) {
      .score-display { display: none; }
      .spatial-grid-wrapper { max-width: 220px; }
    }

    @media (min-width: 768px) {
      .spatial-grid-wrapper { max-width: 360px; }
      .spatial-grid { gap: var(--spacing-lg); }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ===== FIXED TOP BAR ===== -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-title">Spatial Sequence</span>
      </div>

      <div class="top-bar-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          Lv 2
        </div>
      </div>

      <div class="top-bar-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          <span id="scoreValue">720</span>
        </div>
        <div class="lives-display">
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart3"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="accuracy-meter">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar">
            <div class="accuracy-bar-fill" id="accuracyFill" style="width: 72%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== GAME CONTENT AREA ===== -->
    <main class="game-content">
      <div class="game-container">

        <!-- Level Info -->
        <div class="level-info" id="levelInfo">Sequence: 4 nodes &middot; Level 2</div>

        <!-- Phase Indicator -->
        <div class="phase-indicator">
          <div class="phase-text" id="phaseText">Ready?</div>
          <div class="phase-subtext" id="phaseSubtext">Tap Start to begin</div>
        </div>

        <!-- Spatial Grid -->
        <div class="spatial-grid-wrapper" id="gridWrapper">
          <svg class="path-svg" id="pathSvg"></svg>
          <div class="spatial-grid" id="spatialGrid">
            <div class="node disabled" data-index="0"><span class="node-label">440Hz</span></div>
            <div class="node disabled" data-index="1"><span class="node-label">550Hz</span></div>
            <div class="node disabled" data-index="2"><span class="node-label">660Hz</span></div>
            <div class="node disabled" data-index="3"><span class="node-label">880Hz</span></div>
            <div class="node disabled" data-index="4"><span class="node-label">330Hz</span></div>
            <div class="node disabled" data-index="5"><span class="node-label">770Hz</span></div>
            <div class="node disabled" data-index="6"><span class="node-label">440Hz</span></div>
            <div class="node disabled" data-index="7"><span class="node-label">990Hz</span></div>
            <div class="node disabled" data-index="8"><span class="node-label">550Hz</span></div>
            <div class="node disabled" data-index="9"><span class="node-label">660Hz</span></div>
            <div class="node disabled" data-index="10"><span class="node-label">880Hz</span></div>
            <div class="node disabled" data-index="11"><span class="node-label">440Hz</span></div>
            <div class="node disabled" data-index="12"><span class="node-label">770Hz</span></div>
            <div class="node disabled" data-index="13"><span class="node-label">550Hz</span></div>
            <div class="node disabled" data-index="14"><span class="node-label">990Hz</span></div>
            <div class="node disabled" data-index="15"><span class="node-label">660Hz</span></div>
          </div>
        </div>

        <!-- Audio Bars -->
        <div class="audio-bars paused" id="audioBars">
          <div class="audio-bar"></div>
          <div class="audio-bar"></div>
          <div class="audio-bar"></div>
          <div class="audio-bar"></div>
          <div class="audio-bar"></div>
          <div class="audio-bar"></div>
          <div class="audio-bar"></div>
        </div>

      </div>
    </main>

    <!-- ===== FIXED BOTTOM BAR ===== -->
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button class="btn-control" id="pauseBtn" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
      </div>

      <div class="bottom-bar-center">
        <button class="btn-primary-action" id="submitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start
        </button>
      </div>

      <div class="bottom-bar-right">
        <button class="btn-hint" id="hintBtn" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Hint</span>
        </button>
        <button class="btn-control" id="soundBtn" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <!-- ===== PAUSE OVERLAY ===== -->
  <div class="pause-overlay hidden" id="pauseOverlay">
    <div class="pause-card">
      <div class="pause-title">Paused</div>
      <div class="pause-buttons">
        <button class="btn-pause btn-pause-resume" id="resumeBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Resume
        </button>
        <button class="btn-pause btn-pause-restart" id="restartBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Restart
        </button>
        <button class="btn-pause btn-pause-quit" id="quitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Quit to Hub
        </button>
      </div>
    </div>
  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    (() => {
      // --- State ---
      let phase = 'idle';
      let sequence = [];
      let userSequence = [];
      let currentShowIndex = 0;
      let showTimeout = null;
      let soundOn = true;
      let score = 720;
      let lives = 3;
      let accuracy = 72;
      let seqLength = 4;

      // --- DOM ---
      const grid = document.getElementById('spatialGrid');
      const nodes = grid.querySelectorAll('.node');
      const pathSvg = document.getElementById('pathSvg');
      const phaseText = document.getElementById('phaseText');
      const phaseSubtext = document.getElementById('phaseSubtext');
      const levelInfo = document.getElementById('levelInfo');
      const audioBars = document.getElementById('audioBars');
      const pauseBtn = document.getElementById('pauseBtn');
      const pauseOverlay = document.getElementById('pauseOverlay');
      const resumeBtn = document.getElementById('resumeBtn');
      const restartBtn = document.getElementById('restartBtn');
      const quitBtn = document.getElementById('quitBtn');
      const submitBtn = document.getElementById('submitBtn');
      const soundBtn = document.getElementById('soundBtn');
      const hintBtn = document.getElementById('hintBtn');
      const scoreValue = document.getElementById('scoreValue');
      const accuracyFill = document.getElementById('accuracyFill');

      // --- Helpers ---
      function generateSequence() {
        sequence = [];
        const indices = Array.from({length: 16}, (_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        sequence = indices.slice(0, seqLength);
      }

      function updateScore(delta) {
        score = Math.max(0, score + delta);
        scoreValue.textContent = score.toLocaleString();
      }

      function loseLife() {
        if (lives > 0) {
          lives--;
          const heart = document.getElementById('heart' + (lives + 1));
          if (heart) { heart.classList.remove('active'); heart.classList.add('empty'); }
        }
      }

      function updateAccuracy(val) {
        accuracy = Math.min(100, Math.max(0, val));
        accuracyFill.style.width = accuracy + '%';
      }

      function getNodeCenter(idx) {
        const node = nodes[idx];
        const gridRect = grid.getBoundingClientRect();
        const nodeRect = node.getBoundingClientRect();
        return {
          x: nodeRect.left + nodeRect.width / 2 - gridRect.left,
          y: nodeRect.top + nodeRect.height / 2 - gridRect.top
        };
      }

      function drawPath(path) {
        pathSvg.innerHTML = '';
        if (path.length < 2) return;
        let d = 'M ' + getNodeCenter(path[0]).x + ' ' + getNodeCenter(path[0]).y;
        for (let i = 1; i < path.length; i++) {
          const c = getNodeCenter(path[i]);
          d += ' L ' + c.x + ' ' + c.y;
        }
        const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pathEl.setAttribute('d', d);
        pathEl.setAttribute('class', 'path-line');
        pathSvg.appendChild(pathEl);
      }

      // --- Watch Phase ---
      function startWatchPhase() {
        phase = 'watch';
        userSequence = [];
        currentShowIndex = 0;

        generateSequence();
        clearNodes();
        pathSvg.innerHTML = '';

        phaseText.textContent = 'Watch the sequence!';
        phaseText.className = 'phase-text watch';
        phaseSubtext.textContent = 'Remember the order';
        levelInfo.textContent = 'Sequence: ' + seqLength + ' nodes \u00B7 Level 2';

        nodes.forEach(n => n.classList.add('disabled'));
        audioBars.classList.remove('paused');

        showNextNode();
      }

      function showNextNode() {
        if (currentShowIndex >= sequence.length) {
          setTimeout(startRecallPhase, 500);
          return;
        }

        const idx = sequence[currentShowIndex];
        nodes[idx].classList.add('active');

        setTimeout(() => {
          nodes[idx].classList.remove('active');
          currentShowIndex++;
          showNextNode();
        }, 600);
      }

      // --- Recall Phase ---
      function startRecallPhase() {
        phase = 'recall';
        userSequence = [];

        phaseText.textContent = 'Your turn!';
        phaseText.className = 'phase-text recall';
        phaseSubtext.textContent = 'Tap nodes in the same order';
        audioBars.classList.add('paused');

        nodes.forEach(n => {
          n.className = 'node';
        });
        pathSvg.innerHTML = '';
      }

      function clearNodes() {
        nodes.forEach(n => {
          n.className = 'node disabled';
        });
      }

      // --- Node Click ---
      nodes.forEach((node, idx) => {
        node.addEventListener('click', () => {
          if (phase !== 'recall') return;

          userSequence.push(idx);
          const expectedIdx = sequence[userSequence.length - 1];

          if (idx === expectedIdx) {
            node.classList.add('correct');
            setTimeout(() => node.classList.remove('correct'), 400);
            drawPath(userSequence);
            updateScore(25);

            if (userSequence.length === sequence.length) {
              // Complete!
              phase = 'idle';
              phaseText.textContent = 'Perfect!';
              phaseText.className = 'phase-text';
              phaseText.style.color = 'var(--success)';
              phaseSubtext.textContent = 'Amazing spatial memory!';
              updateScore(50);
              updateAccuracy(accuracy + 4);
              nodes.forEach(n => n.classList.add('disabled'));

              setTimeout(() => {
                phaseText.style.color = '';
                startWatchPhase();
              }, 1500);
            }
          } else {
            // Wrong
            node.classList.add('wrong');
            loseLife();
            updateScore(-30);
            updateAccuracy(accuracy - 6);

            phaseText.textContent = 'Wrong!';
            phaseText.className = 'phase-text';
            phaseText.style.color = 'var(--error)';
            phaseSubtext.textContent = 'Sequence reset. Try again!';

            // Show correct sequence
            setTimeout(() => {
              node.classList.remove('wrong');
              clearNodes();
              // Flash the correct sequence
              sequence.forEach((sIdx, i) => {
                setTimeout(() => {
                  nodes[sIdx].classList.add('active');
                  setTimeout(() => nodes[sIdx].classList.remove('active'), 400);
                }, i * 500);
              });
              setTimeout(() => {
                phaseText.style.color = '';
                startWatchPhase();
              }, sequence.length * 500 + 800);
            }, 800);
          }
        });
      });

      // --- Submit Button ---
      submitBtn.addEventListener('click', () => {
        if (phase === 'idle') {
          startWatchPhase();
          submitBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Next`;
        }
      });

      // --- Hint ---
      hintBtn.addEventListener('click', () => {
        if (phase === 'recall' && userSequence.length < sequence.length) {
          const nextIdx = sequence[userSequence.length];
          nodes[nextIdx].style.borderColor = 'var(--accent)';
          nodes[nextIdx].style.boxShadow = '0 0 12px var(--shadow-glow-accent)';
          setTimeout(() => {
            nodes[nextIdx].style.borderColor = '';
            nodes[nextIdx].style.boxShadow = '';
          }, 800);
          updateScore(-40);
        }
      });

      // --- Pause ---
      pauseBtn.addEventListener('click', () => {
        pauseOverlay.classList.remove('hidden');
        if (phase === 'watch') { clearTimeout(showTimeout); }
      });

      resumeBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        if (phase === 'watch') { showNextNode(); }
      });

      restartBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearTimeout(showTimeout);
        phaseText.style.color = '';
        startWatchPhase();
      });

      quitBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearTimeout(showTimeout);
        phase = 'idle';
        phaseText.textContent = 'Ready?';
        phaseText.className = 'phase-text';
        phaseText.style.color = '';
        phaseSubtext.textContent = 'Tap Start to begin';
        clearNodes();
        pathSvg.innerHTML = '';
        audioBars.classList.add('paused');
        submitBtn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start`;
      });

      // --- Sound Toggle ---
      soundBtn.addEventListener('click', () => {
        soundOn = !soundOn;
        soundBtn.innerHTML = soundOn
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
               <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
             </svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <line x1="23" y1="9" x2="17" y2="15"/>
               <line x1="17" y1="9" x2="23" y2="15"/>
             </svg>`;
      });
    })();
  </script>
</body>
</html>
