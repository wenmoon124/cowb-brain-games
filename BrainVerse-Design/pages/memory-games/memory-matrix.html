<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F9FC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Memory Matrix - BrainVerse 2.0</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    /* ============================================
       APP SHELL
       ============================================ */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
    }

    /* ============================================
       FIXED TOP BAR (56px)
       ============================================ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-bar-left,
    .top-bar-center,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      flex-shrink: 0;
    }

    .btn-back:hover { background: var(--primary-bg); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 22px; height: 22px; }

    .game-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: var(--dim-memory);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: #FFFFFF;
      white-space: nowrap;
    }

    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
    }

    .score-display svg { width: 16px; height: 16px; color: var(--accent); }

    .lives-display {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .heart-icon {
      width: 18px;
      height: 18px;
      transition: all var(--transition-normal);
    }

    .heart-icon.active {
      color: var(--error);
      fill: var(--error);
      filter: drop-shadow(0 0 3px rgba(239, 68, 68, 0.4));
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    .heart-icon.empty {
      color: var(--text-muted);
      fill: none;
      opacity: 0.35;
    }

    .accuracy-meter {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .accuracy-label {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .accuracy-bar {
      width: 48px;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .accuracy-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dim-memory), #A78BFA);
      border-radius: var(--radius-full);
      transition: width var(--transition-normal);
    }

    /* ============================================
       GAME CONTENT AREA
       ============================================ */
    .game-content {
      flex: 1;
      margin-top: 56px;
      margin-bottom: 72px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg) var(--spacing-md);
    }

    .game-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    /* Timer Bar */
    .timer-container {
      width: 100%;
    }

    .timer-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .timer-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: var(--radius-full);
      transition: width 0.1s linear;
    }

    .timer-bar-fill.warning {
      background: linear-gradient(90deg, var(--warning), var(--accent));
    }

    .timer-bar-fill.danger {
      background: linear-gradient(90deg, var(--error), #F87171);
    }

    /* Phase Indicator */
    .phase-indicator {
      text-align: center;
    }

    .phase-text {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--dim-memory);
      letter-spacing: 0.02em;
    }

    .phase-text.memorize {
      animation: pulse 1.2s ease-in-out infinite;
    }

    .phase-text.recall {
      color: var(--primary);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .phase-subtext {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      margin-top: var(--spacing-xs);
    }

    /* Memory Grid */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--spacing-sm);
      width: 100%;
      max-width: 360px;
      touch-action: manipulation;
    }

    .tile {
      aspect-ratio: 1;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform var(--transition-fast), background-color var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 44px;
    }

    .tile:hover {
      border-color: var(--dim-memory);
      transform: scale(1.03);
    }

    .tile:active {
      transform: scale(0.95);
    }

    /* Flash blue during memorize phase */
    .tile.flash {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 20px var(--shadow-glow-primary), inset 0 0 8px rgba(255, 255, 255, 0.2);
      animation: tilePulse 1.2s ease-in-out;
    }

    @keyframes tilePulse {
      0% { transform: scale(1); box-shadow: 0 0 0 var(--primary-light); }
      30% { transform: scale(1.06); box-shadow: 0 0 24px var(--shadow-glow-primary); }
      70% { transform: scale(1.03); box-shadow: 0 0 16px var(--shadow-glow-primary); }
      100% { transform: scale(1); box-shadow: 0 0 0 var(--primary-light); }
    }

    /* Correct selection */
    .tile.correct {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 16px rgba(80, 200, 168, 0.4);
      animation: correctBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tile.correct::after {
      content: '';
      width: 20px;
      height: 20px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='20 6 9 17 4 12'/%3E%3C/svg%3E");
      background-size: contain;
      background-repeat: no-repeat;
    }

    @keyframes correctBounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* Wrong selection */
    .tile.wrong {
      background: var(--error);
      border-color: var(--error);
      box-shadow: 0 0 16px rgba(239, 68, 68, 0.4);
      animation: shake 0.5s ease-in-out;
    }

    /* Disabled state */
    .tile.disabled {
      pointer-events: none;
      opacity: 0.5;
    }

    /* Found Counter */
    .found-counter {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
    }

    .found-counter .found-num {
      color: var(--success);
      font-weight: var(--font-weight-bold);
      font-size: var(--font-size-lg);
    }

    .found-counter .total-num {
      color: var(--text-muted);
    }

    /* ============================================
       FIXED BOTTOM BAR (72px)
       ============================================ */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 72px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .bottom-bar-left,
    .bottom-bar-center,
    .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .bottom-bar-left { flex: 1; justify-content: flex-start; }
    .bottom-bar-center { flex: 0 0 auto; }
    .bottom-bar-right { flex: 1; justify-content: flex-end; }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    }

    .btn-control:hover { background: var(--border); color: var(--text-primary); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 20px; height: 20px; }

    .btn-primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 48px;
      padding: 0 var(--spacing-xl);
      border: none;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
      white-space: nowrap;
    }

    .btn-primary-action:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--shadow-glow-memory); }
    .btn-primary-action:active { transform: translateY(0) scale(0.97); }
    .btn-primary-action svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 0 var(--spacing-md);
      border: none;
      background: var(--accent-light);
      border-radius: var(--radius-md);
      color: var(--accent);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-hint:hover { background: rgba(255, 177, 74, 0.25); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ============================================
       PAUSE OVERLAY
       ============================================ */
    .pause-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: var(--spacing-lg);
      animation: fadeIn var(--transition-normal);
    }

    .pause-overlay.hidden { display: none; }

    .pause-card {
      width: 100%;
      max-width: 320px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      text-align: center;
      animation: scaleIn var(--transition-normal);
    }

    .pause-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-lg);
    }

    .pause-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .btn-pause {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause:active { transform: scale(0.97); }

    .btn-pause-resume {
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
    }

    .btn-pause-restart { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-pause-restart:hover { background: var(--border); }

    .btn-pause-quit { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .btn-pause-quit:hover { background: rgba(239, 68, 68, 0.18); }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 639px) {
      .top-bar { padding: 0 var(--spacing-sm); }
      .game-title { font-size: var(--font-size-sm); }
      .level-pill { font-size: 10px; padding: 3px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-meter { display: none; }
      .game-content { padding: var(--spacing-md) var(--spacing-sm); }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .btn-primary-action { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-sm); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .memory-grid { gap: 6px; max-width: 300px; }
      .phase-text { font-size: var(--font-size-lg); }
    }

    @media (max-width: 379px) {
      .score-display { display: none; }
      .memory-grid { gap: 5px; max-width: 260px; }
    }

    @media (min-width: 768px) {
      .memory-grid { max-width: 420px; gap: var(--spacing-md); }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ===== FIXED TOP BAR ===== -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-title">Memory Matrix</span>
      </div>

      <div class="top-bar-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          Lv 3
        </div>
      </div>

      <div class="top-bar-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          <span id="scoreValue">1,280</span>
        </div>
        <div class="lives-display">
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart3"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="accuracy-meter">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar">
            <div class="accuracy-bar-fill" id="accuracyFill" style="width: 85%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== GAME CONTENT AREA ===== -->
    <main class="game-content">
      <div class="game-container">

        <!-- Timer Bar -->
        <div class="timer-container">
          <div class="timer-bar">
            <div class="timer-bar-fill" id="timerFill" style="width: 100%"></div>
          </div>
        </div>

        <!-- Phase Indicator -->
        <div class="phase-indicator">
          <div class="phase-text" id="phaseText">Ready?</div>
          <div class="phase-subtext" id="phaseSubtext">Tap Start to begin</div>
        </div>

        <!-- 4x4 Memory Grid -->
        <div class="memory-grid" id="memoryGrid">
          <div class="tile disabled" data-index="0"></div>
          <div class="tile disabled" data-index="1"></div>
          <div class="tile disabled" data-index="2"></div>
          <div class="tile disabled" data-index="3"></div>
          <div class="tile disabled" data-index="4"></div>
          <div class="tile disabled" data-index="5"></div>
          <div class="tile disabled" data-index="6"></div>
          <div class="tile disabled" data-index="7"></div>
          <div class="tile disabled" data-index="8"></div>
          <div class="tile disabled" data-index="9"></div>
          <div class="tile disabled" data-index="10"></div>
          <div class="tile disabled" data-index="11"></div>
          <div class="tile disabled" data-index="12"></div>
          <div class="tile disabled" data-index="13"></div>
          <div class="tile disabled" data-index="14"></div>
          <div class="tile disabled" data-index="15"></div>
        </div>

        <!-- Found Counter -->
        <div class="found-counter">
          Found <span class="found-num" id="foundCount">0</span><span class="total-num">/6</span>
        </div>

      </div>
    </main>

    <!-- ===== FIXED BOTTOM BAR ===== -->
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button class="btn-control" id="pauseBtn" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
      </div>

      <div class="bottom-bar-center">
        <button class="btn-primary-action" id="submitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start
        </button>
      </div>

      <div class="bottom-bar-right">
        <button class="btn-hint" id="hintBtn" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Hint</span>
        </button>
        <button class="btn-control" id="soundBtn" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <!-- ===== PAUSE OVERLAY ===== -->
  <div class="pause-overlay hidden" id="pauseOverlay">
    <div class="pause-card">
      <div class="pause-title">Paused</div>
      <div class="pause-buttons">
        <button class="btn-pause btn-pause-resume" id="resumeBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Resume
        </button>
        <button class="btn-pause btn-pause-restart" id="restartBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Restart
        </button>
        <button class="btn-pause btn-pause-quit" id="quitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Quit to Hub
        </button>
      </div>
    </div>
  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    (() => {
      // --- Constants ---
      const GRID_SIZE = 4;
      const TOTAL_TILES = GRID_SIZE * GRID_SIZE;
      const TILES_TO_FIND = 6;
      const TIMER_DURATION = 10000;

      // --- State ---
      let blueTiles = [];
      let selectedTiles = new Set();
      let foundCount = 0;
      let phase = 'idle';
      let timerInterval = null;
      let timerStart = 0;
      let soundOn = true;
      let score = 1280;
      let lives = 3;
      let accuracy = 85;

      // --- DOM ---
      const grid = document.getElementById('memoryGrid');
      const tiles = grid.querySelectorAll('.tile');
      const phaseText = document.getElementById('phaseText');
      const phaseSubtext = document.getElementById('phaseSubtext');
      const foundCountEl = document.getElementById('foundCount');
      const timerFill = document.getElementById('timerFill');
      const pauseBtn = document.getElementById('pauseBtn');
      const pauseOverlay = document.getElementById('pauseOverlay');
      const resumeBtn = document.getElementById('resumeBtn');
      const restartBtn = document.getElementById('restartBtn');
      const quitBtn = document.getElementById('quitBtn');
      const submitBtn = document.getElementById('submitBtn');
      const soundBtn = document.getElementById('soundBtn');
      const hintBtn = document.getElementById('hintBtn');
      const scoreValue = document.getElementById('scoreValue');
      const accuracyFill = document.getElementById('accuracyFill');

      // --- Helpers ---
      function generateBlueTiles() {
        blueTiles = [];
        while (blueTiles.length < TILES_TO_FIND) {
          const idx = Math.floor(Math.random() * TOTAL_TILES);
          if (!blueTiles.includes(idx)) blueTiles.push(idx);
        }
      }

      function updateScore(delta) {
        score = Math.max(0, score + delta);
        scoreValue.textContent = score.toLocaleString();
      }

      function loseLife() {
        if (lives > 0) {
          lives--;
          const heart = document.getElementById('heart' + (lives + 1));
          if (heart) { heart.classList.remove('active'); heart.classList.add('empty'); }
        }
      }

      function updateAccuracy(val) {
        accuracy = Math.min(100, Math.max(0, val));
        accuracyFill.style.width = accuracy + '%';
      }

      // --- Memorize Phase ---
      function startMemorizePhase() {
        phase = 'memorize';
        selectedTiles.clear();
        foundCount = 0;
        foundCountEl.textContent = '0';

        phaseText.textContent = 'Memorize the blue tiles!';
        phaseText.className = 'phase-text memorize';
        phaseSubtext.textContent = 'Watch carefully...';

        tiles.forEach(t => { t.className = 'tile disabled'; });

        generateBlueTiles();

        blueTiles.forEach(idx => {
          tiles[idx].classList.add('flash');
        });

        setTimeout(() => {
          tiles.forEach(t => { t.className = 'tile'; });
          startRecallPhase();
        }, 1200);
      }

      // --- Recall Phase ---
      function startRecallPhase() {
        phase = 'recall';
        phaseText.textContent = 'Tap the tiles you remember!';
        phaseText.className = 'phase-text recall';
        phaseSubtext.textContent = 'Find all ' + TILES_TO_FIND + ' tiles';

        timerStart = Date.now();
        timerFill.style.width = '100%';
        timerFill.className = 'timer-bar-fill';

        timerInterval = setInterval(() => {
          const elapsed = Date.now() - timerStart;
          const remaining = Math.max(0, 1 - elapsed / TIMER_DURATION);
          timerFill.style.width = (remaining * 100) + '%';

          if (remaining < 0.3) timerFill.className = 'timer-bar-fill danger';
          else if (remaining < 0.6) timerFill.className = 'timer-bar-fill warning';

          if (remaining <= 0) { clearInterval(timerInterval); handleTimeout(); }
        }, 50);
      }

      // --- Timeout ---
      function handleTimeout() {
        phase = 'idle';
        phaseText.textContent = "Time's Up!";
        phaseText.className = 'phase-text';
        phaseText.style.color = 'var(--error)';
        phaseSubtext.textContent = 'Starting next round...';

        tiles.forEach(t => t.classList.add('disabled'));
        blueTiles.forEach(idx => {
          tiles[idx].style.borderColor = 'var(--primary)';
          tiles[idx].style.background = 'var(--primary-light)';
        });

        loseLife();
        updateAccuracy(accuracy - 10);

        setTimeout(() => {
          tiles.forEach(t => { t.style.borderColor = ''; t.style.background = ''; });
          phaseText.style.color = '';
          startMemorizePhase();
        }, 2000);
      }

      // --- Tile Click ---
      tiles.forEach((tile, idx) => {
        tile.addEventListener('click', () => {
          if (phase !== 'recall') return;
          if (selectedTiles.has(idx)) return;

          selectedTiles.add(idx);

          if (blueTiles.includes(idx)) {
            tile.classList.add('correct');
            foundCount++;
            foundCountEl.textContent = foundCount;
            updateScore(50);
            updateAccuracy(accuracy + 2);

            if (foundCount === TILES_TO_FIND) {
              clearInterval(timerInterval);
              phase = 'idle';
              phaseText.textContent = 'Perfect!';
              phaseText.className = 'phase-text';
              phaseText.style.color = 'var(--success)';
              phaseSubtext.textContent = 'Starting next round...';
              tiles.forEach(t => t.classList.add('disabled'));

              setTimeout(() => {
                phaseText.style.color = '';
                startMemorizePhase();
              }, 1500);
            }
          } else {
            tile.classList.add('wrong');
            loseLife();
            updateScore(-20);
            updateAccuracy(accuracy - 5);

            setTimeout(() => {
              tile.classList.remove('wrong');
              selectedTiles.delete(idx);
            }, 600);
          }
        });
      });

      // --- Submit Button ---
      submitBtn.addEventListener('click', () => {
        if (phase === 'idle') {
          startMemorizePhase();
          submitBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Submit`;
        } else if (phase === 'recall') {
          clearInterval(timerInterval);
          phase = 'idle';
          tiles.forEach((t, idx) => {
            t.classList.add('disabled');
            if (blueTiles.includes(idx) && !selectedTiles.has(idx)) {
              t.style.borderColor = 'var(--primary)';
              t.style.background = 'var(--primary-light)';
            }
          });
          phaseText.textContent = foundCount === TILES_TO_FIND ? 'Perfect!' : 'Found ' + foundCount + '/' + TILES_TO_FIND;
          phaseText.className = 'phase-text';
          phaseText.style.color = foundCount === TILES_TO_FIND ? 'var(--success)' : 'var(--warning)';
          phaseSubtext.textContent = 'Starting next round...';

          setTimeout(() => {
            tiles.forEach(t => { t.style.borderColor = ''; t.style.background = ''; });
            phaseText.style.color = '';
            startMemorizePhase();
          }, 2000);
        }
      });

      // --- Hint ---
      hintBtn.addEventListener('click', () => {
        if (phase === 'recall') {
          const unrevealed = blueTiles.filter(idx => !selectedTiles.has(idx));
          if (unrevealed.length > 0) {
            const hintIdx = unrevealed[Math.floor(Math.random() * unrevealed.length)];
            tiles[hintIdx].style.borderColor = 'var(--accent)';
            tiles[hintIdx].style.boxShadow = '0 0 12px var(--shadow-glow-accent)';
            setTimeout(() => {
              tiles[hintIdx].style.borderColor = '';
              tiles[hintIdx].style.boxShadow = '';
            }, 800);
            updateScore(-30);
          }
        }
      });

      // --- Pause ---
      pauseBtn.addEventListener('click', () => {
        pauseOverlay.classList.remove('hidden');
        if (phase === 'recall') clearInterval(timerInterval);
      });

      resumeBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        if (phase === 'recall') {
          const elapsed = Date.now() - timerStart;
          const remaining = Math.max(0, TIMER_DURATION - elapsed);
          timerStart = Date.now() - (TIMER_DURATION - remaining);
          timerInterval = setInterval(() => {
            const el = Date.now() - timerStart;
            const rem = Math.max(0, 1 - el / TIMER_DURATION);
            timerFill.style.width = (rem * 100) + '%';
            if (rem < 0.3) timerFill.className = 'timer-bar-fill danger';
            else if (rem < 0.6) timerFill.className = 'timer-bar-fill warning';
            if (rem <= 0) { clearInterval(timerInterval); handleTimeout(); }
          }, 50);
        }
      });

      restartBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearInterval(timerInterval);
        phaseText.style.color = '';
        startMemorizePhase();
      });

      quitBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearInterval(timerInterval);
        phase = 'idle';
        phaseText.textContent = 'Ready?';
        phaseText.className = 'phase-text';
        phaseText.style.color = '';
        phaseSubtext.textContent = 'Tap Start to begin';
        tiles.forEach(t => { t.className = 'tile disabled'; t.style.borderColor = ''; t.style.background = ''; });
        timerFill.style.width = '100%';
        timerFill.className = 'timer-bar-fill';
        foundCount = 0;
        foundCountEl.textContent = '0';
        selectedTiles.clear();
        submitBtn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start`;
      });

      // --- Sound Toggle ---
      soundBtn.addEventListener('click', () => {
        soundOn = !soundOn;
        soundBtn.innerHTML = soundOn
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
               <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
             </svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <line x1="23" y1="9" x2="17" y2="15"/>
               <line x1="17" y1="9" x2="23" y2="15"/>
             </svg>`;
      });
    })();
  </script>
</body>
</html>
