<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F9FC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Backward Digit Span - BrainVerse 2.0</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    /* ============================================
       APP SHELL
       ============================================ */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
    }

    /* ============================================
       FIXED TOP BAR (56px)
       ============================================ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-bar-left,
    .top-bar-center,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      flex-shrink: 0;
    }

    .btn-back:hover { background: var(--primary-bg); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 22px; height: 22px; }

    .game-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: var(--dim-memory);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: #FFFFFF;
      white-space: nowrap;
    }

    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
    }

    .score-display svg { width: 16px; height: 16px; color: var(--accent); }

    .lives-display {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .heart-icon {
      width: 18px;
      height: 18px;
      transition: all var(--transition-normal);
    }

    .heart-icon.active {
      color: var(--error);
      fill: var(--error);
      filter: drop-shadow(0 0 3px rgba(239, 68, 68, 0.4));
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    .heart-icon.empty {
      color: var(--text-muted);
      fill: none;
      opacity: 0.35;
    }

    .accuracy-meter {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .accuracy-label {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .accuracy-bar {
      width: 48px;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .accuracy-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dim-memory), #A78BFA);
      border-radius: var(--radius-full);
      transition: width var(--transition-normal);
    }

    /* ============================================
       GAME CONTENT AREA
       ============================================ */
    .game-content {
      flex: 1;
      margin-top: 56px;
      margin-bottom: 72px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg) var(--spacing-md);
    }

    .game-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    /* Level Info */
    .level-info {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--text-secondary);
    }

    /* Phase Indicator */
    .phase-indicator {
      text-align: center;
    }

    .phase-text {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--dim-memory);
      letter-spacing: 0.02em;
    }

    .phase-text.watch {
      animation: pulse 1.2s ease-in-out infinite;
    }

    .phase-text.recall {
      color: var(--primary);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .phase-subtext {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      margin-top: var(--spacing-xs);
    }

    .phase-subtext.reverse-hint {
      color: var(--secondary);
      font-weight: var(--font-weight-semibold);
    }

    /* Digit Display */
    .digit-display-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .digit-show {
      font-family: 'Courier New', 'SF Mono', monospace;
      font-size: var(--font-size-5xl);
      font-weight: var(--font-weight-bold);
      color: var(--primary);
      text-shadow: 0 0 30px var(--shadow-glow-primary);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: digitFadeIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes digitFadeIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Progress Dots */
    .progress-dots {
      display: flex;
      gap: var(--spacing-sm);
      justify-content: center;
      flex-wrap: wrap;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
      background: var(--border);
      transition: all var(--transition-normal);
    }

    .progress-dot.active {
      background: var(--primary);
      box-shadow: 0 0 8px var(--shadow-glow-primary);
      transform: scale(1.3);
    }

    .progress-dot.done {
      background: var(--success);
    }

    /* Input Area */
    .input-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .digit-input-display {
      font-family: 'Courier New', 'SF Mono', monospace;
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-md) var(--spacing-xl);
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 280px;
      position: relative;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .digit-input-display.focused {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .digit-input-display.shake {
      animation: shake 0.5s ease-in-out;
      border-color: var(--error);
    }

    .cursor-blink {
      display: inline-block;
      width: 3px;
      height: 0.8em;
      background: var(--primary);
      margin-left: 2px;
      animation: blink-caret 1s step-end infinite;
    }

    /* Virtual Numpad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-sm);
      width: 100%;
      max-width: 280px;
      touch-action: manipulation;
    }

    .numpad-key {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      font-family: 'Courier New', 'SF Mono', monospace;
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
      -webkit-user-select: none;
    }

    .numpad-key:hover {
      background: var(--card-hover);
      border-color: var(--dim-memory);
    }

    .numpad-key:active {
      transform: scale(0.95);
      background: var(--primary-light);
    }

    .numpad-key.correct-flash {
      background: var(--success);
      border-color: var(--success);
      color: #FFFFFF;
    }

    .numpad-key.wrong-flash {
      background: var(--error);
      border-color: var(--error);
      color: #FFFFFF;
    }

    .numpad-key.backspace {
      font-size: var(--font-size-lg);
      color: var(--text-secondary);
    }

    .numpad-key.backspace:hover {
      color: var(--error);
      border-color: var(--error);
    }

    /* ============================================
       FIXED BOTTOM BAR (72px)
       ============================================ */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 72px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .bottom-bar-left,
    .bottom-bar-center,
    .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .bottom-bar-left { flex: 1; justify-content: flex-start; }
    .bottom-bar-center { flex: 0 0 auto; }
    .bottom-bar-right { flex: 1; justify-content: flex-end; }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    }

    .btn-control:hover { background: var(--border); color: var(--text-primary); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 20px; height: 20px; }

    .btn-primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 48px;
      padding: 0 var(--spacing-xl);
      border: none;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
      white-space: nowrap;
    }

    .btn-primary-action:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--shadow-glow-memory); }
    .btn-primary-action:active { transform: translateY(0) scale(0.97); }
    .btn-primary-action svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 0 var(--spacing-md);
      border: none;
      background: var(--accent-light);
      border-radius: var(--radius-md);
      color: var(--accent);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-hint:hover { background: rgba(255, 177, 74, 0.25); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ============================================
       PAUSE OVERLAY
       ============================================ */
    .pause-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: var(--spacing-lg);
      animation: fadeIn var(--transition-normal);
    }

    .pause-overlay.hidden { display: none; }

    .pause-card {
      width: 100%;
      max-width: 320px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      text-align: center;
      animation: scaleIn var(--transition-normal);
    }

    .pause-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-lg);
    }

    .pause-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .btn-pause {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause:active { transform: scale(0.97); }

    .btn-pause-resume {
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
    }

    .btn-pause-restart { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-pause-restart:hover { background: var(--border); }

    .btn-pause-quit { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .btn-pause-quit:hover { background: rgba(239, 68, 68, 0.18); }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 639px) {
      .top-bar { padding: 0 var(--spacing-sm); }
      .game-title { font-size: var(--font-size-sm); }
      .level-pill { font-size: 10px; padding: 3px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-meter { display: none; }
      .game-content { padding: var(--spacing-md) var(--spacing-sm); }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .btn-primary-action { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-sm); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .digit-show { font-size: var(--font-size-3xl); min-height: 60px; }
      .digit-input-display { font-size: var(--font-size-2xl); }
      .numpad-key { min-height: 48px; font-size: var(--font-size-lg); }
      .phase-text { font-size: var(--font-size-lg); }
    }

    @media (max-width: 379px) {
      .score-display { display: none; }
      .numpad { max-width: 240px; }
    }

    @media (min-width: 768px) {
      .digit-show { font-size: 80px; }
      .numpad { max-width: 320px; }
      .numpad-key { min-height: 64px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ===== FIXED TOP BAR ===== -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-title">Backward Digit Span</span>
      </div>

      <div class="top-bar-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          Lv 3
        </div>
      </div>

      <div class="top-bar-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          <span id="scoreValue">960</span>
        </div>
        <div class="lives-display">
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart3"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="accuracy-meter">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar">
            <div class="accuracy-bar-fill" id="accuracyFill" style="width: 78%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== GAME CONTENT AREA ===== -->
    <main class="game-content">
      <div class="game-container">

        <!-- Level Info -->
        <div class="level-info" id="levelInfo">5 Digits &middot; Level 3</div>

        <!-- Phase Indicator -->
        <div class="phase-indicator">
          <div class="phase-text" id="phaseText">Ready?</div>
          <div class="phase-subtext" id="phaseSubtext">Tap Start to begin</div>
        </div>

        <!-- Digit Display Area (Watch Phase) -->
        <div class="digit-display-area" id="watchArea" style="display: none;">
          <div class="digit-show" id="digitShow">&nbsp;</div>
          <div class="progress-dots" id="progressDots"></div>
        </div>

        <!-- Input Area (Recall Phase) -->
        <div class="input-area" id="inputArea" style="display: none;">
          <div class="digit-input-display" id="inputDisplay">
            <span id="inputText"></span><span class="cursor-blink"></span>
          </div>
          <div class="numpad" id="numpad">
            <button class="numpad-key" data-digit="1">1</button>
            <button class="numpad-key" data-digit="2">2</button>
            <button class="numpad-key" data-digit="3">3</button>
            <button class="numpad-key" data-digit="4">4</button>
            <button class="numpad-key" data-digit="5">5</button>
            <button class="numpad-key" data-digit="6">6</button>
            <button class="numpad-key" data-digit="7">7</button>
            <button class="numpad-key" data-digit="8">8</button>
            <button class="numpad-key" data-digit="9">9</button>
            <button class="numpad-key backspace" id="backspaceKey" data-action="backspace">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                <line x1="18" y1="9" x2="12" y2="15"/>
                <line x1="12" y1="9" x2="18" y2="15"/>
              </svg>
            </button>
            <button class="numpad-key" data-digit="0">0</button>
            <button class="numpad-key" id="clearKey" data-action="clear" style="font-size: var(--font-size-sm); color: var(--text-muted);">CLR</button>
          </div>
        </div>

      </div>
    </main>

    <!-- ===== FIXED BOTTOM BAR ===== -->
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button class="btn-control" id="pauseBtn" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
      </div>

      <div class="bottom-bar-center">
        <button class="btn-primary-action" id="submitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start
        </button>
      </div>

      <div class="bottom-bar-right">
        <button class="btn-hint" id="hintBtn" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Hint</span>
        </button>
        <button class="btn-control" id="soundBtn" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <!-- ===== PAUSE OVERLAY ===== -->
  <div class="pause-overlay hidden" id="pauseOverlay">
    <div class="pause-card">
      <div class="pause-title">Paused</div>
      <div class="pause-buttons">
        <button class="btn-pause btn-pause-resume" id="resumeBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Resume
        </button>
        <button class="btn-pause btn-pause-restart" id="restartBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Restart
        </button>
        <button class="btn-pause btn-pause-quit" id="quitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Quit to Hub
        </button>
      </div>
    </div>
  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    (() => {
      // --- State ---
      let phase = 'idle';
      let sequence = [];
      let userInput = '';
      let currentDigitIndex = 0;
      let digitShowTimeout = null;
      let soundOn = true;
      let score = 960;
      let lives = 3;
      let accuracy = 78;
      let level = 3;
      let digitCount = 5;

      // --- DOM ---
      const phaseText = document.getElementById('phaseText');
      const phaseSubtext = document.getElementById('phaseSubtext');
      const levelInfo = document.getElementById('levelInfo');
      const watchArea = document.getElementById('watchArea');
      const inputArea = document.getElementById('inputArea');
      const digitShow = document.getElementById('digitShow');
      const progressDots = document.getElementById('progressDots');
      const inputDisplay = document.getElementById('inputDisplay');
      const inputText = document.getElementById('inputText');
      const numpad = document.getElementById('numpad');
      const pauseBtn = document.getElementById('pauseBtn');
      const pauseOverlay = document.getElementById('pauseOverlay');
      const resumeBtn = document.getElementById('resumeBtn');
      const restartBtn = document.getElementById('restartBtn');
      const quitBtn = document.getElementById('quitBtn');
      const submitBtn = document.getElementById('submitBtn');
      const soundBtn = document.getElementById('soundBtn');
      const hintBtn = document.getElementById('hintBtn');
      const scoreValue = document.getElementById('scoreValue');
      const accuracyFill = document.getElementById('accuracyFill');

      // --- Helpers ---
      function generateSequence() {
        sequence = [];
        for (let i = 0; i < digitCount; i++) {
          sequence.push(Math.floor(Math.random() * 10));
        }
      }

      function updateScore(delta) {
        score = Math.max(0, score + delta);
        scoreValue.textContent = score.toLocaleString();
      }

      function loseLife() {
        if (lives > 0) {
          lives--;
          const heart = document.getElementById('heart' + (lives + 1));
          if (heart) { heart.classList.remove('active'); heart.classList.add('empty'); }
        }
      }

      function updateAccuracy(val) {
        accuracy = Math.min(100, Math.max(0, val));
        accuracyFill.style.width = accuracy + '%';
      }

      function buildProgressDots() {
        progressDots.innerHTML = '';
        for (let i = 0; i < sequence.length; i++) {
          const dot = document.createElement('div');
          dot.className = 'progress-dot';
          dot.id = 'dot-' + i;
          progressDots.appendChild(dot);
        }
      }

      // --- Watch Phase ---
      function startWatchPhase() {
        phase = 'watch';
        generateSequence();
        currentDigitIndex = 0;
        userInput = '';

        phaseText.textContent = 'Watch carefully!';
        phaseText.className = 'phase-text watch';
        phaseSubtext.textContent = 'Remember the sequence';
        phaseSubtext.className = 'phase-subtext';

        watchArea.style.display = 'flex';
        inputArea.style.display = 'none';

        buildProgressDots();
        showNextDigit();
      }

      function showNextDigit() {
        if (currentDigitIndex >= sequence.length) {
          startRecallPhase();
          return;
        }

        digitShow.textContent = sequence[currentDigitIndex];
        digitShow.style.animation = 'none';
        digitShow.offsetHeight; // reflow
        digitShow.style.animation = 'digitFadeIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';

        // Update dots
        const dot = document.getElementById('dot-' + currentDigitIndex);
        if (dot) dot.classList.add('active');

        currentDigitIndex++;
        digitShowTimeout = setTimeout(showNextDigit, 800);
      }

      // --- Recall Phase ---
      function startRecallPhase() {
        phase = 'recall';
        userInput = '';

        phaseText.textContent = 'Your turn!';
        phaseText.className = 'phase-text recall';
        phaseSubtext.textContent = 'Enter digits in REVERSE order';
        phaseSubtext.className = 'phase-subtext reverse-hint';

        watchArea.style.display = 'none';
        inputArea.style.display = 'flex';

        inputText.textContent = '';
        inputDisplay.classList.add('focused');
      }

      // --- Numpad Handlers ---
      numpad.querySelectorAll('.numpad-key[data-digit]').forEach(key => {
        key.addEventListener('click', () => {
          if (phase !== 'recall') return;
          if (userInput.length >= sequence.length) return;

          const digit = key.dataset.digit;
          userInput += digit;
          inputText.textContent = userInput;

          // Check if this digit is correct (reverse order)
          const expectedIndex = sequence.length - 1 - (userInput.length - 1);
          const expectedDigit = sequence[expectedIndex];

          if (digit === String(expectedDigit)) {
            key.classList.add('correct-flash');
            setTimeout(() => key.classList.remove('correct-flash'), 300);
          } else {
            key.classList.add('wrong-flash');
            inputDisplay.classList.add('shake');
            setTimeout(() => {
              key.classList.remove('wrong-flash');
              inputDisplay.classList.remove('shake');
            }, 500);
          }

          // Auto-submit when all digits entered
          if (userInput.length === sequence.length) {
            setTimeout(checkAnswer, 400);
          }
        });
      });

      document.getElementById('backspaceKey').addEventListener('click', () => {
        if (phase !== 'recall' || userInput.length === 0) return;
        userInput = userInput.slice(0, -1);
        inputText.textContent = userInput;
      });

      document.getElementById('clearKey').addEventListener('click', () => {
        if (phase !== 'recall') return;
        userInput = '';
        inputText.textContent = '';
      });

      // --- Check Answer ---
      function checkAnswer() {
        const reversed = [...sequence].reverse().join('');
        const isCorrect = userInput === reversed;

        if (isCorrect) {
          phaseText.textContent = 'Correct!';
          phaseText.className = 'phase-text';
          phaseText.style.color = 'var(--success)';
          phaseSubtext.textContent = 'Great memory!';
          updateScore(100);
          updateAccuracy(accuracy + 3);
          inputDisplay.classList.remove('focused');
          inputDisplay.style.borderColor = 'var(--success)';

          setTimeout(() => {
            inputDisplay.style.borderColor = '';
            phaseText.style.color = '';
            startWatchPhase();
          }, 1500);
        } else {
          phaseText.textContent = 'Wrong!';
          phaseText.className = 'phase-text';
          phaseText.style.color = 'var(--error)';
          phaseSubtext.textContent = 'Correct: ' + reversed;
          loseLife();
          updateScore(-40);
          updateAccuracy(accuracy - 8);
          inputDisplay.classList.add('shake');

          setTimeout(() => {
            inputDisplay.classList.remove('shake');
            phaseText.style.color = '';
            startWatchPhase();
          }, 2500);
        }
      }

      // --- Submit Button ---
      submitBtn.addEventListener('click', () => {
        if (phase === 'idle') {
          startWatchPhase();
          submitBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Submit`;
        } else if (phase === 'recall' && userInput.length === sequence.length) {
          checkAnswer();
        }
      });

      // --- Hint ---
      hintBtn.addEventListener('click', () => {
        if (phase === 'recall') {
          const reversed = [...sequence].reverse();
          const nextIdx = userInput.length;
          if (nextIdx < reversed.length) {
            const hintDigit = reversed[nextIdx];
            inputText.textContent = userInput + hintDigit;
            userInput += hintDigit;
            updateScore(-50);
            if (userInput.length === sequence.length) {
              setTimeout(checkAnswer, 400);
            }
          }
        }
      });

      // --- Pause ---
      pauseBtn.addEventListener('click', () => {
        pauseOverlay.classList.remove('hidden');
        if (phase === 'watch') { clearTimeout(digitShowTimeout); }
      });

      resumeBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        if (phase === 'watch') { showNextDigit(); }
      });

      restartBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearTimeout(digitShowTimeout);
        phaseText.style.color = '';
        startWatchPhase();
      });

      quitBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearTimeout(digitShowTimeout);
        phase = 'idle';
        phaseText.textContent = 'Ready?';
        phaseText.className = 'phase-text';
        phaseText.style.color = '';
        phaseSubtext.textContent = 'Tap Start to begin';
        phaseSubtext.className = 'phase-subtext';
        watchArea.style.display = 'none';
        inputArea.style.display = 'none';
        submitBtn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start`;
      });

      // --- Sound Toggle ---
      soundBtn.addEventListener('click', () => {
        soundOn = !soundOn;
        soundBtn.innerHTML = soundOn
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
               <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
             </svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <line x1="23" y1="9" x2="17" y2="15"/>
               <line x1="17" y1="9" x2="23" y2="15"/>
             </svg>`;
      });
    })();
  </script>
</body>
</html>
