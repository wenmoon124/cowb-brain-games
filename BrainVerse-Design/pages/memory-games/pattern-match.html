<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F9FC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Pattern Match - BrainVerse 2.0</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    /* ============================================
       APP SHELL
       ============================================ */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
    }

    /* ============================================
       FIXED TOP BAR (56px)
       ============================================ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-bar-left,
    .top-bar-center,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      flex-shrink: 0;
    }

    .btn-back:hover { background: var(--primary-bg); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 22px; height: 22px; }

    .game-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: var(--dim-memory);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: #FFFFFF;
      white-space: nowrap;
    }

    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
    }

    .score-display svg { width: 16px; height: 16px; color: var(--accent); }

    .lives-display {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .heart-icon {
      width: 18px;
      height: 18px;
      transition: all var(--transition-normal);
    }

    .heart-icon.active {
      color: var(--error);
      fill: var(--error);
      filter: drop-shadow(0 0 3px rgba(239, 68, 68, 0.4));
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    .heart-icon.empty {
      color: var(--text-muted);
      fill: none;
      opacity: 0.35;
    }

    .accuracy-meter {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .accuracy-label {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .accuracy-bar {
      width: 48px;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .accuracy-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dim-memory), #A78BFA);
      border-radius: var(--radius-full);
      transition: width var(--transition-normal);
    }

    /* ============================================
       GAME CONTENT AREA
       ============================================ */
    .game-content {
      flex: 1;
      margin-top: 56px;
      margin-bottom: 72px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg) var(--spacing-md);
    }

    .game-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    /* Timer Bar */
    .timer-container {
      width: 100%;
    }

    .timer-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .timer-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: var(--radius-full);
      transition: width 0.1s linear;
    }

    .timer-bar-fill.warning {
      background: linear-gradient(90deg, var(--warning), var(--accent));
    }

    .timer-bar-fill.danger {
      background: linear-gradient(90deg, var(--error), #F87171);
    }

    /* Phase Indicator */
    .phase-indicator {
      text-align: center;
    }

    .phase-text {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--dim-memory);
      letter-spacing: 0.02em;
    }

    .phase-text.active {
      animation: pulse 1.5s ease-in-out infinite;
      color: var(--primary);
    }

    .phase-subtext {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      margin-top: var(--spacing-xs);
    }

    /* Pattern Layout */
    .pattern-layout {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    /* Reference Card */
    .reference-card {
      background: var(--card);
      border: 2px solid var(--dim-memory);
      border-radius: var(--radius-xl);
      padding: var(--spacing-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-md);
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
      position: relative;
    }

    .reference-label {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--dim-memory);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .reference-svg {
      width: 100%;
      max-width: 200px;
      height: auto;
    }

    /* Options Grid */
    .options-section-label {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
      text-align: center;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-md);
      width: 100%;
      touch-action: manipulation;
    }

    .option-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
      min-height: 120px;
    }

    .option-card:hover {
      border-color: var(--dim-memory);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--shadow-subtle);
    }

    .option-card:active {
      transform: translateY(0) scale(0.97);
    }

    .option-card.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light), 0 4px 20px var(--shadow-glow-primary);
    }

    .option-card.correct {
      border-color: var(--success);
      box-shadow: 0 0 0 3px rgba(80, 200, 168, 0.2), 0 4px 20px rgba(80, 200, 168, 0.3);
      animation: correctBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes correctBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .option-card.wrong {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
      animation: shake 0.5s ease-in-out;
    }

    .option-card.disabled {
      pointer-events: none;
      opacity: 0.5;
    }

    .option-svg {
      width: 100%;
      max-width: 120px;
      height: auto;
    }

    /* Overlays on option cards */
    .card-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-fast);
    }

    .option-card.correct .card-overlay.check {
      opacity: 1;
      background: rgba(80, 200, 168, 0.15);
    }

    .option-card.wrong .card-overlay.x-mark {
      opacity: 1;
      background: rgba(239, 68, 68, 0.15);
    }

    .overlay-icon {
      width: 40px;
      height: 40px;
    }

    /* Rotation indicator */
    .rotation-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      background: var(--accent-light);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rotation-badge svg {
      width: 14px;
      height: 14px;
      color: var(--accent);
    }

    /* ============================================
       FIXED BOTTOM BAR (72px)
       ============================================ */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 72px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .bottom-bar-left,
    .bottom-bar-center,
    .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .bottom-bar-left { flex: 1; justify-content: flex-start; }
    .bottom-bar-center { flex: 0 0 auto; }
    .bottom-bar-right { flex: 1; justify-content: flex-end; }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    }

    .btn-control:hover { background: var(--border); color: var(--text-primary); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 20px; height: 20px; }

    .btn-primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 48px;
      padding: 0 var(--spacing-xl);
      border: none;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
      white-space: nowrap;
    }

    .btn-primary-action:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--shadow-glow-memory); }
    .btn-primary-action:active { transform: translateY(0) scale(0.97); }
    .btn-primary-action svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 0 var(--spacing-md);
      border: none;
      background: var(--accent-light);
      border-radius: var(--radius-md);
      color: var(--accent);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-hint:hover { background: rgba(255, 177, 74, 0.25); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ============================================
       PAUSE OVERLAY
       ============================================ */
    .pause-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: var(--spacing-lg);
      animation: fadeIn var(--transition-normal);
    }

    .pause-overlay.hidden { display: none; }

    .pause-card {
      width: 100%;
      max-width: 320px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      text-align: center;
      animation: scaleIn var(--transition-normal);
    }

    .pause-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-lg);
    }

    .pause-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .btn-pause {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause:active { transform: scale(0.97); }

    .btn-pause-resume {
      background: linear-gradient(135deg, var(--dim-memory), #A78BFA);
      color: #FFFFFF;
      box-shadow: 0 4px 20px var(--shadow-glow-memory);
    }

    .btn-pause-restart { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-pause-restart:hover { background: var(--border); }

    .btn-pause-quit { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .btn-pause-quit:hover { background: rgba(239, 68, 68, 0.18); }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 639px) {
      .top-bar { padding: 0 var(--spacing-sm); }
      .game-title { font-size: var(--font-size-sm); }
      .level-pill { font-size: 10px; padding: 3px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-meter { display: none; }
      .game-content { padding: var(--spacing-md) var(--spacing-sm); }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .btn-primary-action { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-sm); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .option-card { min-height: 100px; padding: var(--spacing-sm); }
      .reference-svg { max-width: 150px; }
      .option-svg { max-width: 90px; }
      .phase-text { font-size: var(--font-size-lg); }
    }

    @media (max-width: 379px) {
      .score-display { display: none; }
      .option-card { min-height: 80px; }
    }

    @media (min-width: 768px) {
      .pattern-layout {
        flex-direction: row;
        align-items: flex-start;
        gap: var(--spacing-xl);
      }

      .reference-card {
        flex: 0 0 45%;
      }

      .options-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: var(--spacing-md);
      }

      .reference-svg { max-width: 220px; }
      .option-card { min-height: 140px; }
      .option-svg { max-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ===== FIXED TOP BAR ===== -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-title">Pattern Match</span>
      </div>

      <div class="top-bar-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          Lv 4
        </div>
      </div>

      <div class="top-bar-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          <span id="scoreValue">1,540</span>
        </div>
        <div class="lives-display">
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24" id="heart3"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="accuracy-meter">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar">
            <div class="accuracy-bar-fill" id="accuracyFill" style="width: 90%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== GAME CONTENT AREA ===== -->
    <main class="game-content">
      <div class="game-container">

        <!-- Timer Bar -->
        <div class="timer-container">
          <div class="timer-bar">
            <div class="timer-bar-fill" id="timerFill" style="width: 100%"></div>
          </div>
        </div>

        <!-- Phase Indicator -->
        <div class="phase-indicator">
          <div class="phase-text" id="phaseText">Ready?</div>
          <div class="phase-subtext" id="phaseSubtext">Tap Start to begin</div>
        </div>

        <!-- Pattern Layout -->
        <div class="pattern-layout" id="patternLayout">
          <!-- Reference Card -->
          <div class="reference-card" id="referenceCard">
            <div class="reference-label">Reference Pattern</div>
            <svg class="reference-svg" id="referenceSvg" viewBox="0 0 200 200">
              <!-- Default pattern: triangle + circle + rectangle -->
              <polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/>
              <circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/>
              <rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>
            </svg>
          </div>

          <!-- Options Section -->
          <div class="options-section">
            <div class="options-section-label">Find the matching pattern!</div>
            <div class="options-grid" id="optionsGrid">
              <!-- Option A (Correct - same pattern) -->
              <div class="option-card disabled" data-option="0">
                <svg class="option-svg" viewBox="0 0 200 200">
                  <polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/>
                  <circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/>
                  <rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>
                </svg>
                <div class="card-overlay check">
                  <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </div>
              </div>

              <!-- Option B (Wrong - different shapes) -->
              <div class="option-card disabled" data-option="1">
                <svg class="option-svg" viewBox="0 0 200 200">
                  <polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/>
                  <rect x="75" y="85" width="50" height="50" rx="6" fill="var(--dim-memory)" opacity="0.6"/>
                  <rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>
                </svg>
                <div class="card-overlay x-mark">
                  <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </div>
              </div>

              <!-- Option C (Wrong - rotated pattern) -->
              <div class="option-card disabled" data-option="2">
                <svg class="option-svg" viewBox="0 0 200 200" style="transform: rotate(180deg);">
                  <polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/>
                  <circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/>
                  <rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>
                </svg>
                <div class="rotation-badge">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                  </svg>
                </div>
                <div class="card-overlay x-mark">
                  <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </div>
              </div>

              <!-- Option D (Wrong - different arrangement) -->
              <div class="option-card disabled" data-option="3">
                <svg class="option-svg" viewBox="0 0 200 200">
                  <polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/>
                  <circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/>
                  <circle cx="60" cy="160" r="15" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>
                </svg>
                <div class="card-overlay x-mark">
                  <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

    <!-- ===== FIXED BOTTOM BAR ===== -->
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button class="btn-control" id="pauseBtn" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
      </div>

      <div class="bottom-bar-center">
        <button class="btn-primary-action" id="submitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start
        </button>
      </div>

      <div class="bottom-bar-right">
        <button class="btn-hint" id="hintBtn" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Hint</span>
        </button>
        <button class="btn-control" id="soundBtn" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <!-- ===== PAUSE OVERLAY ===== -->
  <div class="pause-overlay hidden" id="pauseOverlay">
    <div class="pause-card">
      <div class="pause-title">Paused</div>
      <div class="pause-buttons">
        <button class="btn-pause btn-pause-resume" id="resumeBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Resume
        </button>
        <button class="btn-pause btn-pause-restart" id="restartBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Restart
        </button>
        <button class="btn-pause btn-pause-quit" id="quitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Quit to Hub
        </button>
      </div>
    </div>
  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    (() => {
      // --- Pattern Library ---
      const patterns = [
        {
          name: 'triangle-circle-rect',
          ref: `<polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/>
                <circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/>
                <rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>`,
          options: [
            { correct: true, svg: `<polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/><circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/><rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>`, rotate: 0 },
            { correct: false, svg: `<polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/><rect x="75" y="85" width="50" height="50" rx="6" fill="var(--dim-memory)" opacity="0.6"/><rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>`, rotate: 0 },
            { correct: false, svg: `<polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/><circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/><rect x="70" y="140" width="60" height="30" rx="6" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>`, rotate: 180 },
            { correct: false, svg: `<polygon points="100,30 170,150 30,150" fill="none" stroke="var(--primary)" stroke-width="3"/><circle cx="100" cy="110" r="25" fill="var(--dim-memory)" opacity="0.6"/><circle cx="60" cy="160" r="15" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>`, rotate: 0 }
          ]
        },
        {
          name: 'diamond-star-circle',
          ref: `<polygon points="100,20 180,100 100,180 20,100" fill="none" stroke="var(--secondary)" stroke-width="3"/>
                <polygon points="100,55 115,90 150,95 125,120 130,155 100,138 70,155 75,120 50,95 85,90" fill="var(--primary)" opacity="0.5"/>
                <circle cx="100" cy="100" r="18" fill="none" stroke="var(--dim-memory)" stroke-width="2.5"/>`,
          options: [
            { correct: false, svg: `<polygon points="100,20 180,100 100,180 20,100" fill="none" stroke="var(--secondary)" stroke-width="3"/><polygon points="100,55 115,90 150,95 125,120 130,155 100,138 70,155 75,120 50,95 85,90" fill="var(--primary)" opacity="0.5"/><rect x="82" y="82" width="36" height="36" rx="4" fill="none" stroke="var(--dim-memory)" stroke-width="2.5"/>`, rotate: 0 },
            { correct: true, svg: `<polygon points="100,20 180,100 100,180 20,100" fill="none" stroke="var(--secondary)" stroke-width="3"/><polygon points="100,55 115,90 150,95 125,120 130,155 100,138 70,155 75,120 50,95 85,90" fill="var(--primary)" opacity="0.5"/><circle cx="100" cy="100" r="18" fill="none" stroke="var(--dim-memory)" stroke-width="2.5"/>`, rotate: 0 },
            { correct: false, svg: `<polygon points="100,20 180,100 100,180 20,100" fill="none" stroke="var(--secondary)" stroke-width="3"/><polygon points="100,55 115,90 150,95 125,120 130,155 100,138 70,155 75,120 50,95 85,90" fill="var(--primary)" opacity="0.5"/><circle cx="100" cy="100" r="18" fill="none" stroke="var(--dim-memory)" stroke-width="2.5"/>`, rotate: 90 },
            { correct: false, svg: `<polygon points="100,20 180,100 100,180 20,100" fill="none" stroke="var(--secondary)" stroke-width="3"/><circle cx="100" cy="70" r="20" fill="var(--primary)" opacity="0.5"/><circle cx="100" cy="100" r="18" fill="none" stroke="var(--dim-memory)" stroke-width="2.5"/>`, rotate: 0 }
          ]
        },
        {
          name: 'hexagon-triangles',
          ref: `<polygon points="100,25 165,60 165,130 100,165 35,130 35,60" fill="none" stroke="var(--dim-memory)" stroke-width="3"/>
                <polygon points="100,50 130,100 70,100" fill="var(--primary)" opacity="0.4"/>
                <polygon points="100,140 130,90 70,90" fill="var(--secondary)" opacity="0.4"/>`,
          options: [
            { correct: false, svg: `<polygon points="100,25 165,60 165,130 100,165 35,130 35,60" fill="none" stroke="var(--dim-memory)" stroke-width="3"/><polygon points="100,50 130,100 70,100" fill="var(--primary)" opacity="0.4"/><polygon points="100,140 130,90 70,90" fill="var(--primary)" opacity="0.4"/>`, rotate: 0 },
            { correct: false, svg: `<polygon points="100,25 165,60 165,130 100,165 35,130 35,60" fill="none" stroke="var(--dim-memory)" stroke-width="3"/><polygon points="100,50 130,100 70,100" fill="var(--primary)" opacity="0.4"/><polygon points="100,140 130,90 70,90" fill="var(--secondary)" opacity="0.4"/>`, rotate: 120 },
            { correct: false, svg: `<polygon points="100,25 165,60 165,130 100,165 35,130 35,60" fill="none" stroke="var(--dim-memory)" stroke-width="3"/><rect x="70" y="60" width="60" height="30" rx="4" fill="var(--primary)" opacity="0.4"/><polygon points="100,140 130,90 70,90" fill="var(--secondary)" opacity="0.4"/>`, rotate: 0 },
            { correct: true, svg: `<polygon points="100,25 165,60 165,130 100,165 35,130 35,60" fill="none" stroke="var(--dim-memory)" stroke-width="3"/><polygon points="100,50 130,100 70,100" fill="var(--primary)" opacity="0.4"/><polygon points="100,140 130,90 70,90" fill="var(--secondary)" opacity="0.4"/>`, rotate: 0 }
          ]
        }
      ];

      // --- State ---
      let phase = 'idle';
      let currentPattern = null;
      let selectedOption = -1;
      let timerInterval = null;
      let timerStart = 0;
      let soundOn = true;
      let score = 1540;
      let lives = 3;
      let accuracy = 90;
      const TIMER_DURATION = 15000;

      // --- DOM ---
      const referenceSvg = document.getElementById('referenceSvg');
      const optionsGrid = document.getElementById('optionsGrid');
      const optionCards = optionsGrid.querySelectorAll('.option-card');
      const phaseText = document.getElementById('phaseText');
      const phaseSubtext = document.getElementById('phaseSubtext');
      const timerFill = document.getElementById('timerFill');
      const pauseBtn = document.getElementById('pauseBtn');
      const pauseOverlay = document.getElementById('pauseOverlay');
      const resumeBtn = document.getElementById('resumeBtn');
      const restartBtn = document.getElementById('restartBtn');
      const quitBtn = document.getElementById('quitBtn');
      const submitBtn = document.getElementById('submitBtn');
      const soundBtn = document.getElementById('soundBtn');
      const hintBtn = document.getElementById('hintBtn');
      const scoreValue = document.getElementById('scoreValue');
      const accuracyFill = document.getElementById('accuracyFill');

      // --- Helpers ---
      function updateScore(delta) {
        score = Math.max(0, score + delta);
        scoreValue.textContent = score.toLocaleString();
      }

      function loseLife() {
        if (lives > 0) {
          lives--;
          const heart = document.getElementById('heart' + (lives + 1));
          if (heart) { heart.classList.remove('active'); heart.classList.add('empty'); }
        }
      }

      function updateAccuracy(val) {
        accuracy = Math.min(100, Math.max(0, val));
        accuracyFill.style.width = accuracy + '%';
      }

      function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // --- Load Pattern ---
      function loadPattern() {
        currentPattern = patterns[Math.floor(Math.random() * patterns.length)];
        selectedOption = -1;

        // Set reference
        referenceSvg.innerHTML = currentPattern.ref;

        // Shuffle and set options
        const shuffled = shuffleArray(currentPattern.options);
        optionCards.forEach((card, idx) => {
          const opt = shuffled[idx];
          const svgEl = card.querySelector('.option-svg');
          svgEl.innerHTML = opt.svg;
          svgEl.style.transform = opt.rotate ? `rotate(${opt.rotate}deg)` : '';
          card.dataset.correct = opt.correct ? '1' : '0';
          card.className = 'option-card';
        });
      }

      // --- Start Round ---
      function startRound() {
        phase = 'playing';
        loadPattern();

        phaseText.textContent = 'Find the matching pattern!';
        phaseText.className = 'phase-text active';
        phaseSubtext.textContent = 'Look carefully at the reference';

        optionCards.forEach(c => c.classList.remove('disabled'));

        timerStart = Date.now();
        timerFill.style.width = '100%';
        timerFill.className = 'timer-bar-fill';

        timerInterval = setInterval(() => {
          const elapsed = Date.now() - timerStart;
          const remaining = Math.max(0, 1 - elapsed / TIMER_DURATION);
          timerFill.style.width = (remaining * 100) + '%';

          if (remaining < 0.3) timerFill.className = 'timer-bar-fill danger';
          else if (remaining < 0.6) timerFill.className = 'timer-bar-fill warning';

          if (remaining <= 0) { clearInterval(timerInterval); handleTimeout(); }
        }, 50);
      }

      // --- Timeout ---
      function handleTimeout() {
        phase = 'idle';
        phaseText.textContent = "Time's Up!";
        phaseText.className = 'phase-text';
        phaseText.style.color = 'var(--error)';
        phaseSubtext.textContent = 'Next round starting...';

        optionCards.forEach(c => c.classList.add('disabled'));
        // Highlight correct
        optionCards.forEach(c => {
          if (c.dataset.correct === '1') c.style.borderColor = 'var(--success)';
        });

        loseLife();
        updateScore(-30);
        updateAccuracy(accuracy - 5);

        setTimeout(() => {
          phaseText.style.color = '';
          optionCards.forEach(c => { c.style.borderColor = ''; });
          startRound();
        }, 2000);
      }

      // --- Option Click ---
      optionCards.forEach((card, idx) => {
        card.addEventListener('click', () => {
          if (phase !== 'playing') return;

          // Deselect previous
          optionCards.forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedOption = idx;
        });
      });

      // --- Submit ---
      submitBtn.addEventListener('click', () => {
        if (phase === 'idle') {
          startRound();
          submitBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Submit`;
          return;
        }

        if (phase !== 'playing' || selectedOption === -1) return;

        clearInterval(timerInterval);
        phase = 'idle';

        const card = optionCards[selectedOption];
        const isCorrect = card.dataset.correct === '1';

        if (isCorrect) {
          card.classList.add('correct');
          card.classList.remove('selected');
          phaseText.textContent = 'Correct!';
          phaseText.className = 'phase-text';
          phaseText.style.color = 'var(--success)';
          phaseSubtext.textContent = 'Great pattern recognition!';
          updateScore(80);
          updateAccuracy(accuracy + 2);

          optionCards.forEach(c => c.classList.add('disabled'));
        } else {
          card.classList.add('wrong');
          card.classList.remove('selected');
          phaseText.textContent = 'Wrong!';
          phaseText.className = 'phase-text';
          phaseText.style.color = 'var(--error)';
          phaseSubtext.textContent = 'That was not the match';
          loseLife();
          updateScore(-40);
          updateAccuracy(accuracy - 7);

          // Show correct answer
          optionCards.forEach(c => {
            c.classList.add('disabled');
            if (c.dataset.correct === '1') c.style.borderColor = 'var(--success)';
          });
        }

        setTimeout(() => {
          phaseText.style.color = '';
          optionCards.forEach(c => { c.style.borderColor = ''; c.classList.remove('selected'); });
          startRound();
        }, 2000);
      });

      // --- Hint ---
      hintBtn.addEventListener('click', () => {
        if (phase === 'playing') {
          optionCards.forEach(c => {
            if (c.dataset.correct === '1') {
              c.style.borderColor = 'var(--accent)';
              c.style.boxShadow = '0 0 12px var(--shadow-glow-accent)';
              setTimeout(() => {
                c.style.borderColor = '';
                c.style.boxShadow = '';
              }, 800);
            }
          });
          updateScore(-40);
        }
      });

      // --- Pause ---
      pauseBtn.addEventListener('click', () => {
        pauseOverlay.classList.remove('hidden');
        if (phase === 'playing') clearInterval(timerInterval);
      });

      resumeBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        if (phase === 'playing') {
          const elapsed = Date.now() - timerStart;
          const remaining = Math.max(0, TIMER_DURATION - elapsed);
          timerStart = Date.now() - (TIMER_DURATION - remaining);
          timerInterval = setInterval(() => {
            const el = Date.now() - timerStart;
            const rem = Math.max(0, 1 - el / TIMER_DURATION);
            timerFill.style.width = (rem * 100) + '%';
            if (rem < 0.3) timerFill.className = 'timer-bar-fill danger';
            else if (rem < 0.6) timerFill.className = 'timer-bar-fill warning';
            if (rem <= 0) { clearInterval(timerInterval); handleTimeout(); }
          }, 50);
        }
      });

      restartBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearInterval(timerInterval);
        phaseText.style.color = '';
        startRound();
      });

      quitBtn.addEventListener('click', () => {
        pauseOverlay.classList.add('hidden');
        clearInterval(timerInterval);
        phase = 'idle';
        phaseText.textContent = 'Ready?';
        phaseText.className = 'phase-text';
        phaseText.style.color = '';
        phaseSubtext.textContent = 'Tap Start to begin';
        optionCards.forEach(c => { c.className = 'option-card disabled'; c.style.borderColor = ''; });
        timerFill.style.width = '100%';
        timerFill.className = 'timer-bar-fill';
        selectedOption = -1;
        submitBtn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start`;
      });

      // --- Sound Toggle ---
      soundBtn.addEventListener('click', () => {
        soundOn = !soundOn;
        soundBtn.innerHTML = soundOn
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
               <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
             </svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
               <line x1="23" y1="9" x2="17" y2="15"/>
               <line x1="17" y1="9" x2="23" y2="15"/>
             </svg>`;
      });
    })();
  </script>
</body>
</html>
