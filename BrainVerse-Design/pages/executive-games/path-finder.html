<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BrainVerse 2.0 - Path Finder</title>
  <meta name="theme-color" content="#F7F9FC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --game-top-h: 56px;
      --game-bottom-h: 72px;
      --game-safe-top: env(safe-area-inset-top, 0px);
      --game-safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .app-shell { display: flex; flex-direction: column; height: 100%; height: 100dvh; position: relative; overflow: hidden; }

    /* ===== FIXED TOP BAR ===== */
    .game-top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: var(--z-sticky);
      height: var(--game-top-h); padding-top: var(--game-safe-top);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: var(--spacing-sm); padding-right: var(--spacing-sm);
      background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .game-top-bar::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--dim-executive), transparent); opacity: 0.4;
    }
    .top-left, .top-center, .top-right { display: flex; align-items: center; gap: var(--spacing-xs); }
    .top-left { flex: 1; min-width: 0; }
    .top-center { flex: 0 0 auto; }
    .top-right { flex: 1; justify-content: flex-end; min-width: 0; }
    .btn-back {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border: none;
      background: var(--bg-secondary); border-radius: var(--radius-md);
      color: var(--text-primary); cursor: pointer; transition: all var(--transition-fast); flex-shrink: 0;
    }
    .btn-back:hover { background: var(--border); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 20px; height: 20px; }
    .game-name { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .level-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; background: var(--dim-executive); border-radius: var(--radius-full);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); color: #fff; white-space: nowrap;
    }
    .level-pill svg { width: 12px; height: 12px; }
    .score-display { display: flex; align-items: center; gap: 3px; font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--text-primary); }
    .score-display svg { width: 14px; height: 14px; color: var(--accent); }
    .lives-display { display: flex; align-items: center; gap: 2px; }
    .heart-icon { width: 16px; height: 16px; }
    .heart-icon.active { color: var(--error); fill: var(--error); filter: drop-shadow(0 0 3px rgba(239,68,68,0.4)); animation: heartbeat 1.5s ease-in-out infinite; }
    .heart-icon.empty { color: var(--text-muted); fill: none; opacity: 0.3; }
    .accuracy-bar-wrap { display: flex; align-items: center; gap: 4px; }
    .accuracy-label { font-size: 10px; font-weight: var(--font-weight-medium); color: var(--text-muted); }
    .accuracy-bar { width: 48px; height: 4px; background: var(--bg-secondary); border-radius: var(--radius-full); overflow: hidden; }
    .accuracy-bar-fill { height: 100%; background: linear-gradient(90deg, var(--dim-executive), var(--success)); border-radius: var(--radius-full); transition: width var(--transition-normal); }
    .timer-display {
      display: flex; align-items: center; gap: 4px;
      font-size: var(--font-size-sm); font-weight: var(--font-weight-bold); font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      padding: 3px 10px; background: var(--bg-secondary); border-radius: var(--radius-sm);
    }
    .timer-display svg { width: 14px; height: 14px; }

    /* ===== GAME AREA ===== */
    .game-area {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; z-index: var(--z-base); overflow: auto;
      padding: calc(var(--game-top-h) + var(--game-safe-top) + var(--spacing-md)) var(--spacing-md) calc(var(--game-bottom-h) + var(--game-safe-bottom) + var(--spacing-md));
      background-image: radial-gradient(circle, var(--border-light) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .game-content { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: var(--spacing-md); }

    /* ===== MAZE INFO ===== */
    .maze-info { display: flex; align-items: center; gap: var(--spacing-sm); flex-wrap: wrap; justify-content: center; }
    .maze-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-md); font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); color: var(--text-secondary);
    }
    .maze-chip svg { width: 14px; height: 14px; }
    .maze-chip .value { color: var(--dim-executive); font-weight: var(--font-weight-bold); }

    /* ===== MAZE GRID ===== */
    .maze-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
    .maze-grid {
      display: grid; gap: 2px;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg); padding: 4px;
    }
    .maze-cell {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      position: relative; transition: background 0.15s ease;
    }
    .maze-cell.wall {
      background: var(--card);
      border: 1px solid var(--border-light);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
    }
    .maze-cell.path { background: var(--bg); cursor: pointer; }
    .maze-cell.path:hover { background: var(--bg-secondary); }
    .maze-cell.trail {
      background: var(--dim-executive) !important;
      box-shadow: var(--shadow-glow-executive);
      animation: trailGlow 1.5s ease-in-out infinite alternate;
    }
    @keyframes trailGlow {
      0% { box-shadow: 0 0 8px var(--shadow-glow-executive); }
      100% { box-shadow: 0 0 16px var(--shadow-glow-executive), 0 0 24px rgba(16,185,129,0.15); }
    }
    .maze-cell.trail::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 6px; height: 6px; background: rgba(255,255,255,0.6);
      border-radius: 50%; transform: translate(-50%, -50%);
    }
    .maze-cell.start {
      background: rgba(16,185,129,0.15);
      box-shadow: var(--shadow-glow-executive);
    }
    .maze-cell.start::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 16px; height: 16px; background: var(--dim-executive);
      border-radius: 50%; transform: translate(-50%, -50%);
      box-shadow: var(--shadow-glow-executive);
      animation: startPulse 2s ease-in-out infinite;
    }
    @keyframes startPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
    }
    .maze-cell.end {
      background: rgba(239,68,68,0.15);
      box-shadow: 0 0 16px rgba(239,68,68,0.3);
    }
    .maze-cell.end::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 16px; height: 16px; background: var(--error);
      border-radius: 50%; transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(239,68,68,0.5);
      animation: endPulse 2s ease-in-out infinite;
    }
    @keyframes endPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
    }
    .maze-cell.wall-hit { animation: wallFlash 0.3s ease; }
    @keyframes wallFlash {
      0%, 100% { background: var(--card); }
      50% { background: rgba(239,68,68,0.3); }
    }

    /* ===== MINIMAP ===== */
    .minimap {
      position: absolute; top: 8px; right: 8px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden; opacity: 0.6;
    }
    .minimap-cell { width: 4px; height: 4px; }
    .minimap-cell.wall { background: var(--text-muted); }
    .minimap-cell.path { background: transparent; }
    .minimap-cell.trail { background: var(--dim-executive); }
    .minimap-cell.start { background: var(--dim-executive); }
    .minimap-cell.end { background: var(--error); }

    /* ===== FIXED BOTTOM BAR ===== */
    .game-bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: var(--z-sticky);
      height: var(--game-bottom-h); padding-bottom: var(--game-safe-bottom);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: var(--spacing-sm); padding-right: var(--spacing-sm);
      background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .game-bottom-bar::before {
      content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--dim-executive), transparent); opacity: 0.4;
    }
    .bottom-left, .bottom-center, .bottom-right { display: flex; align-items: center; gap: var(--spacing-xs); }
    .bottom-left { flex: 1; justify-content: flex-start; }
    .bottom-center { flex: 0 0 auto; }
    .bottom-right { flex: 1; justify-content: flex-end; }
    .btn-ctrl {
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px; width: 44px; height: 44px;
      border: none; background: var(--bg-secondary); border-radius: var(--radius-md);
      color: var(--text-secondary); cursor: pointer; transition: all var(--transition-fast);
    }
    .btn-ctrl:hover { background: var(--border); color: var(--text-primary); }
    .btn-ctrl:active { transform: scale(0.92); }
    .btn-ctrl svg { width: 20px; height: 20px; }
    .btn-submit {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      min-height: 44px; padding: 0 var(--spacing-xl); border: none; border-radius: var(--radius-lg);
      background: var(--dim-executive); color: #fff;
      font-family: var(--font-family); font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
      cursor: pointer; transition: all var(--transition-fast);
      box-shadow: var(--shadow-glow-executive); white-space: nowrap;
    }
    .btn-submit:hover { transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0) scale(0.97); }
    .btn-submit svg { width: 18px; height: 18px; }
    .btn-hint {
      display: inline-flex; align-items: center; gap: 4px;
      min-height: 44px; padding: 0 14px; border: none;
      background: rgba(255,177,74,0.1); border-radius: var(--radius-md);
      color: var(--warning); font-family: var(--font-family);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .btn-hint:hover { background: rgba(255,177,74,0.18); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }
    .btn-clear {
      display: inline-flex; align-items: center; gap: 6px;
      min-height: 44px; padding: 0 18px; border: none;
      background: rgba(239,68,68,0.08); border-radius: var(--radius-md);
      color: var(--error); font-family: var(--font-family);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .btn-clear:hover { background: rgba(239,68,68,0.15); }
    .btn-clear:active { transform: scale(0.95); }
    .btn-clear svg { width: 16px; height: 16px; }

    /* ===== PAUSE OVERLAY ===== */
    .pause-overlay {
      position: fixed; inset: 0; z-index: var(--z-modal);
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: var(--spacing-lg); animation: fadeIn var(--transition-normal);
    }
    .pause-overlay.hidden { display: none; }
    .pause-card {
      width: 100%; max-width: 320px; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: var(--spacing-xl);
      text-align: center; box-shadow: var(--shadow-xl); animation: scaleIn var(--transition-normal);
    }
    .pause-title { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); margin-bottom: var(--spacing-lg); }
    .pause-buttons { display: flex; flex-direction: column; gap: var(--spacing-sm); }
    .btn-pause {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; min-height: 48px; border: none; border-radius: var(--radius-lg);
      font-family: var(--font-family); font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause-resume { background: var(--dim-executive); color: #fff; box-shadow: var(--shadow-glow-executive); }
    .btn-pause-restart { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-pause-quit { background: rgba(239,68,68,0.08); color: var(--error); }
    .btn-pause:active { transform: scale(0.97); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 639px) {
      .game-top-bar { padding-left: var(--spacing-xs); padding-right: var(--spacing-xs); }
      .game-name { font-size: var(--font-size-xs); }
      .level-pill { font-size: 10px; padding: 2px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-bar-wrap { display: none; }
      .game-bottom-bar { padding-left: var(--spacing-xs); padding-right: var(--spacing-xs); }
      .btn-submit { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-xs); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .btn-clear span { display: none; }
      .btn-clear { padding: 0; width: 44px; }
      .maze-cell { width: 32px; height: 32px; }
      .maze-chip { font-size: 10px; padding: 4px 10px; }
    }
    @media (max-width: 380px) { .maze-cell { width: 28px; height: 28px; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="game-top-bar">
      <div class="top-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <span class="game-name">Path Finder</span>
      </div>
      <div class="top-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
          Level 1
        </div>
        <div class="timer-display" id="timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          0:00
        </div>
      </div>
      <div class="top-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
          <span id="score-value">0</span>
        </div>
        <div class="lives-display" id="lives-display">
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="accuracy-bar-wrap">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar"><div class="accuracy-bar-fill" id="accuracy-fill" style="width:100%"></div></div>
        </div>
      </div>
    </header>

    <main class="game-area">
      <div class="game-content">
        <div class="maze-info">
          <div class="maze-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
            <span class="value" id="maze-size">8x8</span>
          </div>
          <div class="maze-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Branches: <span class="value" id="branch-count">12</span>
          </div>
        </div>
        <div class="maze-wrapper">
          <div class="maze-grid" id="maze-grid"></div>
          <div class="minimap" id="minimap"></div>
        </div>
      </div>
    </main>

    <footer class="game-bottom-bar">
      <div class="bottom-left">
        <button class="btn-ctrl" id="btn-pause" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
      </div>
      <div class="bottom-center">
        <button class="btn-clear" id="btn-clear" aria-label="Clear path">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span>Clear Path</span>
        </button>
      </div>
      <div class="bottom-right">
        <button class="btn-hint" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Hint</span>
        </button>
        <button class="btn-ctrl" id="btn-sound" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
    </footer>

    <div class="pause-overlay hidden" id="pause-overlay">
      <div class="pause-card">
        <div class="pause-title">Paused</div>
        <div class="pause-buttons">
          <button class="btn-pause btn-pause-resume" id="btn-resume">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Resume
          </button>
          <button class="btn-pause btn-pause-restart" id="btn-restart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            New Maze
          </button>
          <a href="../game-hub/index.html" class="btn-pause btn-pause-quit" style="text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Quit to Hub
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ROWS = 8, COLS = 8;
    let maze = [], trail = [], isDrawing = false, timerSeconds = 0, timerInterval = null, score = 0;
    let startPos = { r: 0, c: 0 }, endPos = { r: 7, c: 7 };
    const mazeGrid = document.getElementById('maze-grid');
    const minimap = document.getElementById('minimap');
    const timerEl = document.getElementById('timer');
    const scoreValue = document.getElementById('score-value');

    function generateMaze() {
      maze = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => 1));
      function carve(r, c) {
        maze[r][c] = 0;
        const dirs = [[0,2],[0,-2],[2,0],[-2,0]];
        for (let i = dirs.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [dirs[i], dirs[j]] = [dirs[j], dirs[i]]; }
        for (const [dr, dc] of dirs) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && maze[nr][nc] === 1) {
            maze[r + dr/2][c + dc/2] = 0; carve(nr, nc);
          }
        }
      }
      carve(0, 0);
      maze[startPos.r][startPos.c] = 0;
      maze[endPos.r][endPos.c] = 0;
      let branches = 0;
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        if (maze[r][c] === 0) { let open = 0; if (r > 0 && maze[r-1][c] === 0) open++; if (r < ROWS-1 && maze[r+1][c] === 0) open++; if (c > 0 && maze[r][c-1] === 0) open++; if (c < COLS-1 && maze[r][c+1] === 0) open++; if (open >= 3) branches++; }
      }
      document.getElementById('branch-count').textContent = branches;
    }

    function renderMaze() {
      mazeGrid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
      mazeGrid.innerHTML = '';
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'maze-cell'; cell.dataset.row = r; cell.dataset.col = c;
        if (maze[r][c] === 1) { cell.classList.add('wall'); }
        else {
          cell.classList.add('path');
          if (r === startPos.r && c === startPos.c) cell.classList.add('start');
          if (r === endPos.r && c === endPos.c) cell.classList.add('end');
          cell.addEventListener('mousedown', e => { e.preventDefault(); isDrawing = true; handleCellClick(r, c); });
          cell.addEventListener('mouseenter', () => { if (isDrawing) handleCellClick(r, c); });
          cell.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; handleCellClick(r, c); });
        }
        mazeGrid.appendChild(cell);
      }
      document.addEventListener('mouseup', () => { isDrawing = false; });
      document.addEventListener('touchend', () => { isDrawing = false; });
      mazeGrid.addEventListener('touchmove', e => {
        e.preventDefault(); if (!isDrawing) return;
        const touch = e.touches[0]; const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains('maze-cell') && el.classList.contains('path')) {
          handleCellClick(parseInt(el.dataset.row), parseInt(el.dataset.col));
        }
      }, { passive: false });
      renderMinimap();
    }

    function renderMinimap() {
      minimap.style.display = 'grid'; minimap.style.gridTemplateColumns = `repeat(${COLS}, 4px)`;
      minimap.innerHTML = '';
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'minimap-cell'; cell.id = 'mini-' + r + '-' + c;
        if (maze[r][c] === 1) cell.classList.add('wall'); else cell.classList.add('path');
        minimap.appendChild(cell);
      }
    }

    function updateMinimap() {
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const mc = document.getElementById('mini-' + r + '-' + c);
        mc.className = 'minimap-cell';
        if (maze[r][c] === 1) mc.classList.add('wall'); else mc.classList.add('path');
      }
      trail.forEach(([r, c]) => { const mc = document.getElementById('mini-' + r + '-' + c); mc.className = 'minimap-cell trail'; });
      const ms = document.getElementById('mini-' + startPos.r + '-' + startPos.c); ms.className = 'minimap-cell start';
      const me = document.getElementById('mini-' + endPos.r + '-' + endPos.c); me.className = 'minimap-cell end';
    }

    function handleCellClick(r, c) {
      if (maze[r][c] === 1) {
        const cell = getCell(r, c);
        if (cell) { cell.classList.add('wall-hit'); setTimeout(() => cell.classList.remove('wall-hit'), 300); }
        return;
      }
      if (trail.length > 0) { const last = trail[trail.length - 1]; if (Math.abs(r - last[0]) + Math.abs(c - last[1]) !== 1) return; }
      const existingIdx = trail.findIndex(([tr, tc]) => tr === r && tc === c);
      if (existingIdx >= 0) {
        const removed = trail.splice(existingIdx + 1);
        removed.forEach(([rr, cc]) => { const cell = getCell(rr, cc); if (cell) cell.classList.remove('trail'); });
      } else {
        trail.push([r, c]);
        const cell = getCell(r, c);
        if (cell && !(r === startPos.r && c === startPos.c)) cell.classList.add('trail');
      }
      updateMinimap(); checkWin();
    }

    function getCell(r, c) { return mazeGrid.querySelector(`[data-row="${r}"][data-col="${c}"]`); }

    function checkWin() {
      const last = trail[trail.length - 1];
      if (last && last[0] === endPos.r && last[1] === endPos.c) {
        clearInterval(timerInterval);
        const timeBonus = Math.max(0, 300 - timerSeconds) * 2;
        const pathBonus = Math.max(0, 50 - trail.length) * 5;
        score += 100 + timeBonus + pathBonus;
        scoreValue.textContent = score;
        setTimeout(() => alert('Path Found! Score: ' + score), 300);
      }
    }

    function clearPath() {
      trail.forEach(([r, c]) => { const cell = getCell(r, c); if (cell) cell.classList.remove('trail'); });
      trail = []; updateMinimap();
    }

    function startTimer() {
      clearInterval(timerInterval); timerSeconds = 0;
      timerInterval = setInterval(() => {
        timerSeconds++;
        const m = Math.floor(timerSeconds / 60), s = timerSeconds % 60;
        timerEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${m}:${s.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function initGame() { trail = []; score = 0; scoreValue.textContent = '0'; generateMaze(); renderMaze(); startTimer(); }

    document.getElementById('btn-clear').addEventListener('click', clearPath);
    document.getElementById('btn-pause').addEventListener('click', () => { clearInterval(timerInterval); document.getElementById('pause-overlay').classList.remove('hidden'); });
    document.getElementById('btn-resume').addEventListener('click', () => { document.getElementById('pause-overlay').classList.add('hidden'); startTimer(); });
    document.getElementById('btn-restart').addEventListener('click', () => { document.getElementById('pause-overlay').classList.add('hidden'); initGame(); });

    let soundOn = true;
    document.getElementById('btn-sound').addEventListener('click', function() {
      soundOn = !soundOn;
      this.innerHTML = soundOn
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
    });

    initGame();
  </script>
</body>
</html>
