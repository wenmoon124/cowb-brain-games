<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BrainVerse 2.0 - Tower of Logic</title>
  <meta name="theme-color" content="#F7F9FC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== Page-level custom properties ===== */
    :root {
      --game-top-h: 56px;
      --game-bottom-h: 72px;
      --game-safe-top: env(safe-area-inset-top, 0px);
      --game-safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .app-shell {
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      position: relative; overflow: hidden;
    }

    /* ===== FIXED TOP BAR (56px) ===== */
    .game-top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: var(--z-sticky);
      height: var(--game-top-h);
      padding-top: var(--game-safe-top);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: var(--spacing-sm);
      padding-right: var(--spacing-sm);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .game-top-bar::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--dim-executive), transparent);
      opacity: 0.4;
    }
    .top-left, .top-center, .top-right {
      display: flex; align-items: center; gap: var(--spacing-xs);
    }
    .top-left { flex: 1; min-width: 0; }
    .top-center { flex: 0 0 auto; }
    .top-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border: none;
      background: var(--bg-secondary); border-radius: var(--radius-md);
      color: var(--text-primary); cursor: pointer;
      transition: all var(--transition-fast); flex-shrink: 0;
    }
    .btn-back:hover { background: var(--border); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 20px; height: 20px; }

    .game-name {
      font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .level-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; background: var(--dim-executive); border-radius: var(--radius-full);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
      color: #fff; letter-spacing: 0.02em; white-space: nowrap;
    }
    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex; align-items: center; gap: 3px;
      font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
    }
    .score-display svg { width: 14px; height: 14px; color: var(--accent); }

    .lives-display { display: flex; align-items: center; gap: 2px; }
    .heart-icon { width: 16px; height: 16px; }
    .heart-icon.active { color: var(--error); fill: var(--error); filter: drop-shadow(0 0 3px rgba(239,68,68,0.4)); animation: heartbeat 1.5s ease-in-out infinite; }
    .heart-icon.empty { color: var(--text-muted); fill: none; opacity: 0.3; }

    .accuracy-bar-wrap {
      display: flex; align-items: center; gap: 4px;
    }
    .accuracy-label { font-size: 10px; font-weight: var(--font-weight-medium); color: var(--text-muted); }
    .accuracy-bar { width: 48px; height: 4px; background: var(--bg-secondary); border-radius: var(--radius-full); overflow: hidden; }
    .accuracy-bar-fill { height: 100%; background: linear-gradient(90deg, var(--dim-executive), var(--success)); border-radius: var(--radius-full); transition: width var(--transition-normal); }

    /* ===== GAME AREA (scrollable center) ===== */
    .game-area {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; z-index: var(--z-base);
      overflow: auto;
      padding: calc(var(--game-top-h) + var(--game-safe-top) + var(--spacing-md)) var(--spacing-md) calc(var(--game-bottom-h) + var(--game-safe-bottom) + var(--spacing-md));
      background-image: radial-gradient(circle, var(--border-light) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .game-content {
      width: 100%; max-width: 600px;
      display: flex; flex-direction: column; align-items: center;
      gap: var(--spacing-lg);
    }

    /* ===== HANOI GAME ===== */
    .hanoi-board {
      display: flex; align-items: flex-end; justify-content: center;
      gap: var(--spacing-lg); width: 100%; padding: var(--spacing-md) 0;
    }
    .peg-zone {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; max-width: 180px; position: relative; min-height: 260px;
    }
    .peg-label {
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: var(--spacing-xs);
    }
    .peg-stack {
      position: relative; flex: 1; width: 100%;
      display: flex; flex-direction: column-reverse;
      align-items: center; justify-content: flex-start;
    }
    .peg-pole {
      position: absolute; left: 50%; top: 0; bottom: 0;
      width: 6px; transform: translateX(-50%);
      background: linear-gradient(180deg, var(--border), var(--border-light));
      border-radius: 3px; z-index: 0;
      transition: all var(--transition-normal);
    }
    .peg-base {
      width: 100%; height: 8px;
      background: var(--border);
      border-radius: var(--radius-sm); flex-shrink: 0;
      transition: all var(--transition-normal);
    }

    /* Blocks */
    .block {
      position: relative; z-index: 1;
      height: 34px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--font-size-xs); font-weight: var(--font-weight-bold); color: #fff;
      cursor: grab; transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      margin-bottom: 2px;
    }
    .block:hover { transform: translateY(-3px); }
    .block.dragging {
      cursor: grabbing; transform: translateY(-24px) scale(1.08);
      box-shadow: var(--shadow-xl); z-index: 100; opacity: 0.92;
    }
    .block.size-4 { width: 92%; background: linear-gradient(135deg, var(--error), #DC2626); }
    .block.size-3 { width: 76%; background: linear-gradient(135deg, var(--info), #2563EB); }
    .block.size-2 { width: 60%; background: linear-gradient(135deg, var(--dim-executive), var(--success)); }
    .block.size-1 { width: 44%; background: linear-gradient(135deg, var(--accent), #FF8C00); }

    /* Drop zone glow */
    .peg-zone.valid-drop .peg-pole {
      box-shadow: 0 0 20px var(--shadow-glow-executive);
      background: linear-gradient(180deg, var(--dim-executive), var(--success));
    }
    .peg-zone.valid-drop .peg-base {
      background: var(--dim-executive);
      box-shadow: 0 4px 16px var(--shadow-glow-executive);
    }
    .peg-zone.invalid-drop .peg-pole {
      box-shadow: 0 0 20px rgba(239,68,68,0.5);
      background: var(--error);
      animation: shake 0.4s ease;
    }

    /* Target ghost */
    .target-zone {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; max-width: 180px; position: relative; min-height: 260px;
      opacity: 0.45;
    }
    .target-zone .ghost-block {
      height: 34px; border-radius: var(--radius-md);
      border: 2px dashed var(--border);
      margin-bottom: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--font-size-xs); color: var(--text-muted);
    }
    .target-zone .ghost-block.size-4 { width: 92%; }
    .target-zone .ghost-block.size-3 { width: 76%; }
    .target-zone .ghost-block.size-2 { width: 60%; }
    .target-zone .ghost-block.size-1 { width: 44%; }

    /* Info strip */
    .game-info-strip {
      display: flex; align-items: center; justify-content: center;
      gap: var(--spacing-sm); flex-wrap: wrap;
    }
    .info-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
    }
    .info-chip svg { width: 14px; height: 14px; }
    .info-chip .value { color: var(--dim-executive); font-weight: var(--font-weight-bold); }
    .rule-reminder {
      font-size: var(--font-size-xs); color: var(--warning);
      background: rgba(255,177,74,0.08);
      border: 1px solid rgba(255,177,74,0.2);
      padding: 6px 14px; border-radius: var(--radius-md);
      display: flex; align-items: center; gap: 6px;
    }

    /* ===== FIXED BOTTOM BAR (72px) ===== */
    .game-bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: var(--z-sticky);
      height: var(--game-bottom-h);
      padding-bottom: var(--game-safe-bottom);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: var(--spacing-sm);
      padding-right: var(--spacing-sm);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .game-bottom-bar::before {
      content: ''; position: absolute; top: -1px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--dim-executive), transparent);
      opacity: 0.4;
    }
    .bottom-left, .bottom-center, .bottom-right {
      display: flex; align-items: center; gap: var(--spacing-xs);
    }
    .bottom-left { flex: 1; justify-content: flex-start; }
    .bottom-center { flex: 0 0 auto; }
    .bottom-right { flex: 1; justify-content: flex-end; }

    .btn-ctrl {
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px; width: 44px; height: 44px;
      border: none; background: var(--bg-secondary); border-radius: var(--radius-md);
      color: var(--text-secondary); cursor: pointer;
      transition: all var(--transition-fast);
    }
    .btn-ctrl:hover { background: var(--border); color: var(--text-primary); }
    .btn-ctrl:active { transform: scale(0.92); }
    .btn-ctrl svg { width: 20px; height: 20px; }

    .btn-submit {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      min-height: 44px; padding: 0 var(--spacing-xl); border: none;
      border-radius: var(--radius-lg);
      background: var(--dim-executive); color: #fff;
      font-family: var(--font-family); font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold); cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-glow-executive); white-space: nowrap;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--shadow-glow-executive); }
    .btn-submit:active { transform: translateY(0) scale(0.97); }
    .btn-submit svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex; align-items: center; gap: 4px;
      min-height: 44px; padding: 0 14px; border: none;
      background: rgba(255,177,74,0.1); border-radius: var(--radius-md);
      color: var(--warning); font-family: var(--font-family);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .btn-hint:hover { background: rgba(255,177,74,0.18); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ===== PAUSE OVERLAY ===== */
    .pause-overlay {
      position: fixed; inset: 0; z-index: var(--z-modal);
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); padding: var(--spacing-lg);
      animation: fadeIn var(--transition-normal);
    }
    .pause-overlay.hidden { display: none; }
    .pause-card {
      width: 100%; max-width: 320px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: var(--spacing-xl);
      text-align: center; box-shadow: var(--shadow-xl);
      animation: scaleIn var(--transition-normal);
    }
    .pause-title { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); margin-bottom: var(--spacing-lg); }
    .pause-buttons { display: flex; flex-direction: column; gap: var(--spacing-sm); }
    .btn-pause {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; min-height: 48px; border: none; border-radius: var(--radius-lg);
      font-family: var(--font-family); font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold); cursor: pointer;
      transition: all var(--transition-fast);
    }
    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause-resume { background: var(--dim-executive); color: #fff; box-shadow: var(--shadow-glow-executive); }
    .btn-pause-restart { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-pause-quit { background: rgba(239,68,68,0.08); color: var(--error); }
    .btn-pause:active { transform: scale(0.97); }

    /* ===== FLASH EFFECTS ===== */
    .flash-overlay {
      position: fixed; inset: 0; z-index: 40;
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s ease;
    }
    .flash-overlay.flash-red { background: rgba(239,68,68,0.12); opacity: 1; }
    .flash-overlay.flash-green { background: rgba(16,185,129,0.12); opacity: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 639px) {
      .game-top-bar { padding-left: var(--spacing-xs); padding-right: var(--spacing-xs); }
      .game-name { font-size: var(--font-size-xs); }
      .level-pill { font-size: 10px; padding: 2px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-bar-wrap { display: none; }
      .game-bottom-bar { padding-left: var(--spacing-xs); padding-right: var(--spacing-xs); }
      .btn-submit { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-xs); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .hanoi-board { gap: var(--spacing-sm); }
      .block { height: 28px; font-size: 10px; }
      .target-zone .ghost-block { height: 28px; }
      .peg-zone, .target-zone { min-height: 200px; }
      .game-info-strip { gap: var(--spacing-xs); }
      .info-chip { font-size: 10px; padding: 4px 10px; }
      .rule-reminder { font-size: 10px; }
    }
    @media (max-width: 380px) {
      .hanoi-board { gap: var(--spacing-xs); }
      .block { height: 24px; }
      .peg-zone, .target-zone { min-height: 170px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- FIXED TOP BAR -->
    <header class="game-top-bar">
      <div class="top-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <span class="game-name">Tower of Logic</span>
      </div>
      <div class="top-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
          Level 1
        </div>
      </div>
      <div class="top-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
          <span id="score-val">0</span>
        </div>
        <div class="lives-display" id="lives-display">
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="accuracy-bar-wrap">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar"><div class="accuracy-bar-fill" id="accuracy-fill" style="width:100%"></div></div>
        </div>
      </div>
    </header>

    <!-- GAME AREA -->
    <main class="game-area">
      <div class="game-content">
        <div class="hanoi-board">
          <!-- Peg A -->
          <div class="peg-zone" id="peg-a" data-peg="0">
            <div class="peg-label">A</div>
            <div class="peg-stack" id="stack-0">
              <div class="peg-pole"></div>
              <div class="block size-4" draggable="true" data-size="4">4</div>
              <div class="block size-3" draggable="true" data-size="3">3</div>
              <div class="block size-2" draggable="true" data-size="2">2</div>
              <div class="block size-1" draggable="true" data-size="1">1</div>
            </div>
            <div class="peg-base"></div>
          </div>
          <!-- Peg B -->
          <div class="peg-zone" id="peg-b" data-peg="1">
            <div class="peg-label">B</div>
            <div class="peg-stack" id="stack-1">
              <div class="peg-pole"></div>
            </div>
            <div class="peg-base"></div>
          </div>
          <!-- Peg C -->
          <div class="peg-zone" id="peg-c" data-peg="2">
            <div class="peg-label">C</div>
            <div class="peg-stack" id="stack-2">
              <div class="peg-pole"></div>
            </div>
            <div class="peg-base"></div>
          </div>
          <!-- Target -->
          <div class="target-zone">
            <div class="peg-label" style="color:var(--dim-executive)">Target</div>
            <div class="ghost-block size-4">4</div>
            <div class="ghost-block size-3">3</div>
            <div class="ghost-block size-2">2</div>
            <div class="ghost-block size-1">1</div>
            <div class="peg-base" style="opacity:0.3"></div>
          </div>
        </div>

        <!-- Info Strip -->
        <div class="game-info-strip">
          <div class="info-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Moves: <span class="value" id="move-count">0/15</span>
          </div>
          <div class="info-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            3 Pegs &middot; 4 Blocks
          </div>
          <div class="rule-reminder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Larger blocks cannot go on smaller ones
          </div>
        </div>
      </div>
    </main>

    <!-- FIXED BOTTOM BAR -->
    <footer class="game-bottom-bar">
      <div class="bottom-left">
        <button class="btn-ctrl" id="btn-pause" aria-label="Pause game">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
      </div>
      <div class="bottom-center">
        <button class="btn-submit" id="btn-reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Reset
        </button>
      </div>
      <div class="bottom-right">
        <button class="btn-hint" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Hint</span>
        </button>
        <button class="btn-ctrl" id="btn-sound" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
    </footer>

    <!-- Flash overlay -->
    <div class="flash-overlay" id="flash-overlay"></div>

    <!-- Pause Overlay -->
    <div class="pause-overlay hidden" id="pause-overlay">
      <div class="pause-card">
        <div class="pause-title">Paused</div>
        <div class="pause-buttons">
          <button class="btn-pause btn-pause-resume" id="btn-resume">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Resume
          </button>
          <button class="btn-pause btn-pause-restart" id="btn-restart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Restart
          </button>
          <a href="../game-hub/index.html" class="btn-pause btn-pause-quit" style="text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Quit to Hub
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Game state
    const pegs = [[4,3,2,1],[],[]];
    let moves = 0;
    const maxMoves = 15;
    let score = 0;
    let lives = 3;
    let totalAttempts = 0;
    let correctAttempts = 0;
    let draggedBlock = null;
    let sourcePeg = null;

    const moveCountEl = document.getElementById('move-count');
    const flashOverlay = document.getElementById('flash-overlay');
    const scoreVal = document.getElementById('score-val');
    const accuracyFill = document.getElementById('accuracy-fill');

    function updateMoveCount() { moveCountEl.textContent = moves + '/' + maxMoves; }
    function updateAccuracy() {
      const acc = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 100;
      accuracyFill.style.width = acc + '%';
    }
    function updateLives() {
      const hearts = document.querySelectorAll('#lives-display .heart-icon');
      hearts.forEach((h, i) => {
        if (i >= lives) { h.classList.remove('active'); h.classList.add('empty'); }
        else { h.classList.remove('empty'); h.classList.add('active'); }
      });
    }

    function renderPegs() {
      for (let i = 0; i < 3; i++) {
        const stack = document.getElementById('stack-' + i);
        const pole = stack.querySelector('.peg-pole');
        stack.querySelectorAll('.block').forEach(b => b.remove());
        pegs[i].forEach(size => {
          const block = document.createElement('div');
          block.className = 'block size-' + size;
          block.draggable = true;
          block.dataset.size = size;
          block.textContent = size;
          block.addEventListener('dragstart', onDragStart);
          block.addEventListener('touchstart', onTouchStart, { passive: false });
          stack.insertBefore(block, pole);
        });
      }
    }

    function onDragStart(e) {
      draggedBlock = e.target;
      const stack = draggedBlock.closest('.peg-stack');
      sourcePeg = parseInt(stack.id.split('-')[1]);
      // Only allow dragging top block
      if (pegs[sourcePeg][pegs[sourcePeg].length - 1] !== parseInt(draggedBlock.dataset.size)) {
        e.preventDefault(); return;
      }
      draggedBlock.classList.add('dragging');
      e.dataTransfer.setData('text/plain', draggedBlock.dataset.size);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => {
        document.querySelectorAll('.peg-zone').forEach(pz => pz.classList.add('valid-drop'));
      }, 0);
    }

    function onTouchStart(e) {
      e.preventDefault();
      draggedBlock = e.target;
      const stack = draggedBlock.closest('.peg-stack');
      sourcePeg = parseInt(stack.id.split('-')[1]);
      if (pegs[sourcePeg][pegs[sourcePeg].length - 1] !== parseInt(draggedBlock.dataset.size)) return;
      draggedBlock.classList.add('dragging');
      document.querySelectorAll('.peg-zone').forEach(pz => pz.classList.add('valid-drop'));
    }

    document.querySelectorAll('.peg-zone').forEach(zone => {
      zone.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
      zone.addEventListener('drop', e => { e.preventDefault(); attemptMove(parseInt(zone.dataset.peg)); });
      zone.addEventListener('dragleave', () => zone.classList.remove('valid-drop', 'invalid-drop'));
      zone.addEventListener('touchend', e => {
        if (!draggedBlock) return;
        const touch = e.changedTouches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const pegZone = target ? target.closest('.peg-zone') : null;
        if (pegZone) attemptMove(parseInt(pegZone.dataset.peg));
        else { draggedBlock.classList.remove('dragging'); draggedBlock = null; }
        document.querySelectorAll('.peg-zone').forEach(pz => pz.classList.remove('valid-drop', 'invalid-drop'));
      });
    });

    function attemptMove(targetPeg) {
      if (draggedBlock === null || sourcePeg === null) return;
      const blockSize = parseInt(draggedBlock.dataset.size);
      const targetTop = pegs[targetPeg].length > 0 ? pegs[targetPeg][pegs[targetPeg].length - 1] : Infinity;
      totalAttempts++;

      if (blockSize > targetTop) {
        flash('red');
        draggedBlock.classList.remove('dragging');
        draggedBlock = null;
        document.querySelectorAll('.peg-zone').forEach(pz => pz.classList.remove('valid-drop', 'invalid-drop'));
        updateAccuracy();
        return;
      }

      pegs[sourcePeg].pop();
      pegs[targetPeg].push(blockSize);
      moves++;
      correctAttempts++;
      score += 10;
      scoreVal.textContent = score;
      updateMoveCount();
      updateAccuracy();
      flash('green');
      draggedBlock.classList.remove('dragging');
      draggedBlock = null;
      sourcePeg = null;
      document.querySelectorAll('.peg-zone').forEach(pz => pz.classList.remove('valid-drop', 'invalid-drop'));
      renderPegs();
      checkWin();
    }

    function flash(color) {
      flashOverlay.className = 'flash-overlay flash-' + color;
      setTimeout(() => { flashOverlay.className = 'flash-overlay'; }, 300);
    }

    function checkWin() {
      if (pegs[2].length === 4 && pegs[2][0] === 4 && pegs[2][1] === 3 && pegs[2][2] === 2 && pegs[2][3] === 1) {
        score += Math.max(0, (maxMoves - moves) * 20);
        scoreVal.textContent = score;
        setTimeout(() => alert('Level Complete! Score: ' + score), 300);
      }
    }

    document.getElementById('btn-pause').addEventListener('click', () => {
      document.getElementById('pause-overlay').classList.remove('hidden');
    });
    document.getElementById('btn-resume').addEventListener('click', () => {
      document.getElementById('pause-overlay').classList.add('hidden');
    });
    document.getElementById('btn-restart').addEventListener('click', () => {
      pegs[0] = [4,3,2,1]; pegs[1] = []; pegs[2] = [];
      moves = 0; score = 0; totalAttempts = 0; correctAttempts = 0;
      scoreVal.textContent = '0'; updateMoveCount(); updateAccuracy(); renderPegs();
      document.getElementById('pause-overlay').classList.add('hidden');
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      pegs[0] = [4,3,2,1]; pegs[1] = []; pegs[2] = [];
      moves = 0; score = 0; totalAttempts = 0; correctAttempts = 0;
      scoreVal.textContent = '0'; updateMoveCount(); updateAccuracy(); renderPegs();
    });

    let soundOn = true;
    document.getElementById('btn-sound').addEventListener('click', function() {
      soundOn = !soundOn;
      this.innerHTML = soundOn
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
    });

    renderPegs();
  </script>
</body>
</html>
