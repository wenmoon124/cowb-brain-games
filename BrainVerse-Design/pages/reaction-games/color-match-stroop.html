<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Color Match / Stroop | BrainVerse 2.0</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Color Match / Stroop — Reaction Speed Game
       Dimension: Reaction (var(--dim-reaction) = #FFB14A)
       ============================================================ */

    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    /* ============================================================
       FIXED TOP BAR (56px)
       ============================================================ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 56px;
      padding-top: env(safe-area-inset-top, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .top-bar::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--dim-reaction), transparent);
      opacity: 0.5;
    }
    .top-bar-left, .top-bar-center, .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .top-bar-left { flex: 1; min-width: 0; }
    .top-bar-center { flex: 0 0 auto; }
    .top-bar-right { flex: 1; justify-content: flex-end; min-width: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      min-width: 44px;
      min-height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      flex-shrink: 0;
      text-decoration: none;
    }
    .btn-back:hover { background: var(--border); }
    .btn-back:active { transform: scale(0.92); }
    .btn-back svg { width: 20px; height: 20px; }

    .game-name {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--dim-reaction);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      color: var(--bg);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .level-pill svg { width: 12px; height: 12px; }

    .score-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
    }
    .score-display svg { width: 16px; height: 16px; color: var(--dim-reaction); }

    .lives-display { display: flex; align-items: center; gap: 2px; }
    .heart-icon {
      width: 18px;
      height: 18px;
      transition: all var(--transition-normal);
    }
    .heart-icon.active {
      color: var(--error);
      fill: var(--error);
      filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.4));
      animation: heartbeat 1.5s ease-in-out infinite;
    }
    .heart-icon.empty {
      color: var(--text-muted);
      fill: none;
      opacity: 0.3;
    }

    .accuracy-meter { display: flex; align-items: center; gap: 6px; }
    .accuracy-label {
      font-size: 10px;
      font-weight: var(--font-weight-medium);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .accuracy-bar {
      width: 48px;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .accuracy-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dim-reaction), var(--accent));
      border-radius: var(--radius-full);
      transition: width var(--transition-normal);
    }

    /* ============================================================
       GAME AREA (Main Center)
       ============================================================ */
    .game-area {
      flex: 1;
      margin-top: 56px;
      margin-bottom: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: var(--z-base);
      overflow: hidden;
      padding: var(--spacing-lg);
      transition: background-color 0.8s ease;
    }

    /* Subtle background color shift based on displayed color */
    .game-area.bg-red    { background-color: color-mix(in srgb, var(--error) 4%, var(--bg)); }
    .game-area.bg-blue   { background-color: color-mix(in srgb, var(--info) 4%, var(--bg)); }
    .game-area.bg-green  { background-color: color-mix(in srgb, var(--success) 4%, var(--bg)); }
    .game-area.bg-yellow { background-color: color-mix(in srgb, var(--warning) 4%, var(--bg)); }
    .game-area.bg-purple { background-color: color-mix(in srgb, var(--dim-memory) 4%, var(--bg)); }
    .game-area.bg-orange { background-color: color-mix(in srgb, var(--accent) 4%, var(--bg)); }

    /* Fallback for browsers without color-mix */
    @supports not (color: color-mix(in srgb, red 50%, blue)) {
      .game-area.bg-red    { background-color: var(--bg); }
      .game-area.bg-blue   { background-color: var(--bg); }
      .game-area.bg-green  { background-color: var(--bg); }
      .game-area.bg-yellow { background-color: var(--bg); }
      .game-area.bg-purple { background-color: var(--bg); }
      .game-area.bg-orange { background-color: var(--bg); }
    }

    /* ============================================================
       STROOP GAME CONTENT
       ============================================================ */
    .stroop-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 600px;
      gap: var(--spacing-xl);
    }

    /* Instruction text */
    .stroop-instruction {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* The BIG color word */
    .stroop-word {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: var(--font-weight-bold);
      line-height: var(--line-height-tight);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      padding: var(--spacing-md);
      position: relative;
      transition: color 0.15s ease;
      animation: word-appear 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes word-appear {
      0%   { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Subtle glow behind the word */
    .stroop-word::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: var(--radius-xl);
      background: radial-gradient(circle, currentColor, transparent 70%);
      opacity: 0.06;
      filter: blur(20px);
      z-index: -1;
    }

    /* Keyboard hint (desktop only) */
    .stroop-keyboard-hint {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }
    .key-hint {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .key-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 var(--spacing-sm);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
    }

    /* ============================================================
       MATCH / MISMATCH BUTTONS
       ============================================================ */
    .stroop-buttons {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      width: 100%;
      max-width: 420px;
    }

    .stroop-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 80px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-family);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), filter var(--transition-fast);
      position: relative;
      overflow: hidden;
    }

    .stroop-btn-match {
      background: var(--success);
      color: #FFFFFF;
      box-shadow: 0 4px 20px rgba(80, 200, 168, 0.3);
    }
    .stroop-btn-match:hover {
      box-shadow: 0 6px 28px rgba(80, 200, 168, 0.45);
      transform: translateY(-2px);
    }

    .stroop-btn-mismatch {
      background: var(--error);
      color: #FFFFFF;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
    }
    .stroop-btn-mismatch:hover {
      box-shadow: 0 6px 28px rgba(239, 68, 68, 0.45);
      transform: translateY(-2px);
    }

    .stroop-btn:active { transform: scale(0.96); }

    .stroop-btn-label {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stroop-btn-key {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      opacity: 0.7;
    }

    /* Correct flash */
    .stroop-btn.correct {
      animation: btn-correct-flash 0.4s ease-out;
    }
    @keyframes btn-correct-flash {
      0%   { filter: brightness(1); }
      30%  { filter: brightness(1.8); }
      100% { filter: brightness(1); }
    }

    /* Wrong shake */
    .stroop-btn.wrong {
      animation: btn-shake 0.5s ease-out;
    }
    @keyframes btn-shake {
      0%, 100% { transform: translateX(0); }
      15%  { transform: translateX(-8px); }
      30%  { transform: translateX(8px); }
      45%  { transform: translateX(-6px); }
      60%  { transform: translateX(6px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
    }

    /* Red flash overlay for wrong answer */
    .wrong-flash {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(239, 68, 68, 0.15);
      pointer-events: none;
      animation: wrong-flash-anim 0.4s ease-out forwards;
    }
    @keyframes wrong-flash-anim {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Score popup */
    .score-popup {
      position: absolute;
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--dim-reaction);
      pointer-events: none;
      animation: score-float 0.8s ease-out forwards;
      z-index: 5;
      text-shadow: 0 0 10px var(--shadow-glow-reaction);
    }
    @keyframes score-float {
      0%   { transform: translateY(0) scale(0.5); opacity: 1; }
      20%  { transform: translateY(-10px) scale(1.1); opacity: 1; }
      100% { transform: translateY(-50px) scale(0.8); opacity: 0; }
    }

    /* ============================================================
       GAME INFO STRIPS
       ============================================================ */
    .game-info-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-md);
      width: 100%;
      max-width: 420px;
    }

    .info-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-full);
      border: 1px solid var(--glass-border);
    }
    .info-chip-label {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .info-chip-value {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      color: var(--dim-reaction);
    }

    /* Streak badge (Duolingo fire style) */
    .streak-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: var(--dim-reaction-light);
      border: 1px solid var(--dim-reaction);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      color: var(--dim-reaction);
      animation: streak-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes streak-pop {
      0%   { transform: scale(0.8); }
      100% { transform: scale(1); }
    }

    /* ============================================================
       FIXED BOTTOM BAR (72px)
       ============================================================ */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      height: 72px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: var(--spacing-md);
      padding-right: var(--spacing-md);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .bottom-bar::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--dim-reaction), transparent);
      opacity: 0.4;
    }
    .bottom-bar-left, .bottom-bar-center, .bottom-bar-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .bottom-bar-left { flex: 1; justify-content: flex-start; }
    .bottom-bar-center { flex: 0 0 auto; }
    .bottom-bar-right { flex: 1; justify-content: flex-end; }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    }
    .btn-control:hover { background: var(--border); color: var(--text-primary); }
    .btn-control:active { transform: scale(0.92); }
    .btn-control svg { width: 20px; height: 20px; }

    .btn-primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      min-height: 48px;
      padding: 0 var(--spacing-xl);
      border: none;
      border-radius: var(--radius-lg);
      background: var(--dim-reaction);
      color: var(--bg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-bold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: var(--shadow-glow-reaction);
      white-space: nowrap;
    }
    .btn-primary-action:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--shadow-glow-reaction); }
    .btn-primary-action:active { transform: translateY(0) scale(0.97); }
    .btn-primary-action svg { width: 18px; height: 18px; }

    .btn-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      min-width: 44px;
      padding: 0 var(--spacing-md);
      border: none;
      background: var(--dim-reaction-light);
      border-radius: var(--radius-md);
      color: var(--dim-reaction);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .btn-hint:hover { background: var(--accent); }
    .btn-hint:active { transform: scale(0.95); }
    .btn-hint svg { width: 16px; height: 16px; }

    /* ============================================================
       PAUSE OVERLAY
       ============================================================ */
    .pause-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: var(--spacing-lg);
      animation: fadeIn var(--transition-normal);
    }
    .pause-overlay.hidden { display: none; }

    .pause-card {
      width: 100%;
      max-width: 320px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl) var(--spacing-lg);
      text-align: center;
      box-shadow: var(--shadow-xl);
      animation: scaleIn var(--transition-normal);
    }
    .pause-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-lg);
    }
    .pause-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }
    .btn-pause {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      text-decoration: none;
    }
    .btn-pause svg { width: 18px; height: 18px; }
    .btn-pause-resume {
      background: var(--dim-reaction);
      color: var(--bg);
      box-shadow: var(--shadow-glow-reaction);
    }
    .btn-pause-restart { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-pause-restart:hover { background: var(--border); }
    .btn-pause-quit { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .btn-pause-quit:hover { background: rgba(239, 68, 68, 0.2); }
    .btn-pause:active { transform: scale(0.97); }

    .pause-settings {
      border-top: 1px solid var(--border-light);
      padding-top: var(--spacing-md);
    }
    .pause-settings-title {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--spacing-sm);
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-xs) 0;
    }
    .setting-label {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--text-secondary);
    }

    /* ============================================================
       GAME OVER OVERLAY
       ============================================================ */
    .game-over-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: var(--spacing-lg);
      animation: fadeIn var(--transition-normal);
    }
    .game-over-overlay.hidden { display: none; }

    .game-over-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl) var(--spacing-lg);
      text-align: center;
      box-shadow: var(--shadow-xl);
      animation: scaleIn var(--transition-normal);
    }
    .game-over-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--spacing-xs);
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .game-over-subtitle {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      margin-bottom: var(--spacing-lg);
    }

    .stars-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }
    .star {
      font-size: 32px;
      line-height: 1;
      animation: star-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }
    .star:nth-child(1) { animation-delay: 0.2s; }
    .star:nth-child(2) { animation-delay: 0.35s; }
    .star:nth-child(3) { animation-delay: 0.5s; }
    .star.empty { opacity: 0.2; filter: grayscale(1); }

    @keyframes star-pop {
      0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .final-score {
      font-size: var(--font-size-4xl);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-xs);
      font-variant-numeric: tabular-nums;
    }
    .final-score-label {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      margin-bottom: var(--spacing-lg);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-xl);
    }
    .stat-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: var(--spacing-md) var(--spacing-sm);
    }
    .stat-value {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .stat-label {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
      margin-top: 2px;
    }

    .game-over-buttons {
      display: flex;
      gap: var(--spacing-sm);
    }
    .btn-go-primary {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-lg);
      background: var(--dim-reaction);
      color: var(--bg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: var(--shadow-glow-reaction);
    }
    .btn-go-primary:hover { transform: translateY(-1px); }
    .btn-go-primary:active { transform: scale(0.97); }

    .btn-go-secondary {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast);
      text-decoration: none;
    }
    .btn-go-secondary:hover { background: var(--border); }
    .btn-go-secondary:active { transform: scale(0.97); }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 640px) {
      .top-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .game-name { font-size: var(--font-size-xs); }
      .level-pill { font-size: 10px; padding: 2px 8px; }
      .score-display { font-size: var(--font-size-xs); }
      .accuracy-meter { display: none; }
      .bottom-bar { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }
      .btn-primary-action { min-height: 44px; padding: 0 var(--spacing-lg); font-size: var(--font-size-sm); }
      .btn-hint span { display: none; }
      .btn-hint { padding: 0; width: 44px; }
      .stroop-container { gap: var(--spacing-lg); }
      .stroop-buttons { gap: var(--spacing-sm); }
      .stroop-btn { min-height: 68px; }
      .stroop-btn-label { font-size: var(--font-size-lg); }
      .stroop-keyboard-hint { display: none; }
      .game-info-strip { gap: var(--spacing-sm); }
      .info-chip { padding: 4px 10px; }
      .info-chip-label { font-size: 10px; }
      .info-chip-value { font-size: var(--font-size-xs); }
      .game-over-card { padding: var(--spacing-lg) var(--spacing-md); }
      .game-over-title { font-size: var(--font-size-xl); }
      .final-score { font-size: var(--font-size-3xl); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- ===== FIXED TOP BAR (56px) ===== -->
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="../game-hub/index.html" class="btn-back" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="game-name">Color Match / Stroop</span>
      </div>
      <div class="top-bar-center">
        <div class="level-pill">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          Level 5
        </div>
      </div>
      <div class="top-bar-right">
        <div class="score-display">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          2,450
        </div>
        <div class="lives-display">
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon active" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <svg class="heart-icon empty" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="accuracy-meter">
          <span class="accuracy-label">ACC</span>
          <div class="accuracy-bar">
            <div class="accuracy-bar-fill" style="width: 78%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== GAME AREA (Main Center) ===== -->
    <main class="game-area bg-blue" id="gameArea">
      <div class="stroop-container">

        <!-- Instruction -->
        <div class="stroop-instruction">Does the WORD match its COLOR?</div>

        <!-- The BIG color word -->
        <div class="stroop-word" id="stroopWord" style="color: var(--info);">RED</div>

        <!-- Keyboard hints (desktop) -->
        <div class="stroop-keyboard-hint">
          <div class="key-hint">
            <span class="key-badge">&larr;</span>
            <span>Match</span>
          </div>
          <div class="key-hint">
            <span class="key-badge">&rarr;</span>
            <span>Mismatch</span>
          </div>
        </div>

        <!-- Match / Mismatch buttons -->
        <div class="stroop-buttons">
          <button class="stroop-btn stroop-btn-match" id="btnMatch" onclick="answer(true)">
            <span class="stroop-btn-label">MATCH</span>
            <span class="stroop-btn-key">&larr; Arrow</span>
          </button>
          <button class="stroop-btn stroop-btn-mismatch" id="btnMismatch" onclick="answer(false)">
            <span class="stroop-btn-label">MISMATCH</span>
            <span class="stroop-btn-key">&rarr; Arrow</span>
          </button>
        </div>

        <!-- Game info strip -->
        <div class="game-info-strip">
          <div class="info-chip">
            <span class="info-chip-label">Conflict</span>
            <span class="info-chip-value">45%</span>
          </div>
          <div class="streak-badge" id="streakBadge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            x5
          </div>
          <div class="info-chip">
            <span class="info-chip-label">Round</span>
            <span class="info-chip-value">18/30</span>
          </div>
        </div>

      </div>
    </main>

    <!-- ===== FIXED BOTTOM BAR (72px) ===== -->
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button class="btn-control" aria-label="Pause game" onclick="togglePause()">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
      </div>
      <div class="bottom-bar-center">
        <button class="btn-primary-action" id="mainActionBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Submit
        </button>
      </div>
      <div class="bottom-bar-right">
        <button class="btn-hint" aria-label="Get hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Hint</span>
        </button>
        <button class="btn-control" aria-label="Toggle sound" id="soundBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </footer>

    <!-- ===== PAUSE OVERLAY ===== -->
    <div class="pause-overlay hidden" id="pauseOverlay">
      <div class="pause-card">
        <div class="pause-title">Paused</div>
        <div class="pause-buttons">
          <button class="btn-pause btn-pause-resume" onclick="togglePause()">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Resume
          </button>
          <button class="btn-pause btn-pause-restart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Restart
          </button>
          <a href="../game-hub/index.html" class="btn-pause btn-pause-quit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Quit to Hub
          </a>
        </div>
        <div class="pause-settings">
          <div class="pause-settings-title">Settings</div>
          <div class="setting-row">
            <span class="setting-label">Sound</span>
            <button class="bv-toggle" aria-label="Toggle sound" onclick="this.classList.toggle('active')">
              <span class="bv-toggle-track"><span class="bv-toggle-thumb"></span></span>
            </button>
          </div>
          <div class="setting-row">
            <span class="setting-label">Vibration</span>
            <button class="bv-toggle" aria-label="Toggle vibration" onclick="this.classList.toggle('active')">
              <span class="bv-toggle-track"><span class="bv-toggle-thumb"></span></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== GAME OVER OVERLAY ===== -->
    <div class="game-over-overlay hidden" id="gameOverOverlay">
      <div class="game-over-card">
        <div class="game-over-title">Game Over</div>
        <div class="game-over-subtitle">Your cognitive control is improving!</div>
        <div class="stars-row">
          <span class="star">&#11088;</span>
          <span class="star">&#11088;</span>
          <span class="star empty">&#11088;</span>
        </div>
        <div class="final-score">2,450</div>
        <div class="final-score-label">Final Score</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value">78%</div>
            <div class="stat-label">Accuracy</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">x5</div>
            <div class="stat-label">Best Streak</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">3,200</div>
            <div class="stat-label">Best</div>
          </div>
        </div>
        <div class="game-over-buttons">
          <button class="btn-go-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Play Again
          </button>
          <a href="../game-hub/index.html" class="btn-go-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
            Back to Hub
          </a>
        </div>
      </div>
    </div>

  </div>

  <meta name="author" content="WenMoon124">

  <script>
    // Stroop game colors
    const COLORS = [
      { name: 'RED',    cssVar: 'var(--error)',      bgClass: 'bg-red' },
      { name: 'BLUE',   cssVar: 'var(--info)',       bgClass: 'bg-blue' },
      { name: 'GREEN',  cssVar: 'var(--success)',    bgClass: 'bg-green' },
      { name: 'YELLOW', cssVar: 'var(--warning)',    bgClass: 'bg-yellow' },
      { name: 'PURPLE', cssVar: 'var(--dim-memory)', bgClass: 'bg-purple' },
      { name: 'ORANGE', cssVar: 'var(--accent)',     bgClass: 'bg-orange' }
    ];

    let currentWord = null;
    let currentColor = null;
    let isMatch = false;
    let streak = 5;

    function generateRound() {
      const wordIdx = Math.floor(Math.random() * COLORS.length);
      const colorIdx = Math.floor(Math.random() * COLORS.length);
      currentWord = COLORS[wordIdx];
      currentColor = COLORS[colorIdx];
      isMatch = (wordIdx === colorIdx);

      const wordEl = document.getElementById('stroopWord');
      const areaEl = document.getElementById('gameArea');

      // Remove old bg classes
      COLORS.forEach(c => areaEl.classList.remove(c.bgClass));
      areaEl.classList.add(currentColor.bgClass);

      wordEl.textContent = currentWord.name;
      wordEl.style.color = currentColor.cssVar;
      wordEl.style.animation = 'none';
      wordEl.offsetHeight; // trigger reflow
      wordEl.style.animation = '';
    }

    function answer(userSaysMatch) {
      const btnMatch = document.getElementById('btnMatch');
      const btnMismatch = document.getElementById('btnMismatch');
      const correct = (userSaysMatch === isMatch);

      // Reset button states
      btnMatch.classList.remove('correct', 'wrong');
      btnMismatch.classList.remove('correct', 'wrong');

      if (correct) {
        const btn = userSaysMatch ? btnMatch : btnMismatch;
        btn.classList.add('correct');
        streak++;
        updateStreak();
      } else {
        const btn = userSaysMatch ? btnMatch : btnMismatch;
        btn.classList.add('wrong');

        // Red flash
        const flash = document.createElement('div');
        flash.className = 'wrong-flash';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 400);

        streak = 0;
        updateStreak();
      }

      // Next round after brief delay
      setTimeout(() => { generateRound(); }, 500);
    }

    function updateStreak() {
      const badge = document.getElementById('streakBadge');
      badge.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        x${streak}
      `;
      badge.style.animation = 'none';
      badge.offsetHeight;
      badge.style.animation = '';
    }

    function togglePause() {
      document.getElementById('pauseOverlay').classList.toggle('hidden');
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') answer(true);
      if (e.key === 'ArrowRight') answer(false);
      if (e.key === 'Escape') togglePause();
    });

    // Sound toggle
    const soundBtn = document.getElementById('soundBtn');
    let soundOn = true;
    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundBtn.innerHTML = soundOn
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
             <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
             <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
           </svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
             <line x1="23" y1="9" x2="17" y2="15"/>
             <line x1="17" y1="9" x2="23" y2="15"/>
           </svg>`;
    });
  </script>
</body>
</html>
